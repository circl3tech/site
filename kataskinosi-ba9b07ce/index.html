[/[πΠ]\.\s?Δημήτρης/g,'π. Δημήτριος Χατζηγαβριήλ'],
[/Κ\.\s?Μερτζανίδης/g,'Κωνσταντίνος Μερτζανίδης'],
[/Γιάννης Χαραλάμπους/g,'Ιωάννης Χαραλάμπους'],
[/Γ\.\s?Χαραλάμπους/g,'Ιωάννης Χαραλάμπους'],
[/Α\.\s?Βασιλείου/g,'Ανδρέας Βασιλείου'],
[/Δ\.\s?Μωρα[ΐί]της/g,'Δημήτρης Μωραΐτης'],
[/Θ\.\s?Σταύρου/g,'Θεμιστοκλής Σταύρου'],
[/Ν\.\s?Σταυρινίδης/g,'Νικόλας Σταυρινίδης'],
[/Φ\.\s?Κινδύνης/g,'Φίλιππος Κινδύνης'],
[/Γ\.\s?Νεάρχου/g,'Γιώργος Νεάρχου'],
[/Π\.\s?Μιχαήλ/g,'Πέτρος Μιχαήλ'],
[/Πάρης Παναγή/g,'Πάρης Παναγή'],
[/Θεμιστοκλής(?! Σταύρου)/g,'Θεμιστοκλής Σταύρου'],
[/Αδαμάντιος(?! Χριστοφόρου)/g,'Αδαμάντιος Χριστοφόρου'],
[/Αρσένιος(?! Σαμούτης)/g,'Αρσένιος Σαμούτης'],
[/Πάρ[ηι]ς(?! Παναγή)/g,'Πάρης Παναγή'],
[/Τάσος(?! Ιεροδιακόνου)/g,'Τάσος Ιεροδιακόνου'],
[/Φίλιππος(?! Κινδύνης)/g,'Φίλιππος Κινδύνης'],
[/Κώστας(?! Κωνσταντίνου)/g,'Κώστας Κωνσταντίνου'],
[/Χρυσόστομος(?! Παπαδόπουλος)/g,'Χρυσόστομος Παπαδόπουλος'],
[/Πάνος(?! Παναγιώτου)/g,'Πάνος Παναγιώτου'],
[/Πέτρος(?! Μιχαήλ)/g,'Πέτρος Μιχαήλ'],
[/Ανδρέας(?! Βασιλείου)/g,'Ανδρέας Βασιλείου'],
[/Γιάννης(?! Χαραλάμπους)/g,'Ιωάννης Χαραλάμπους']
];
function full(s){for(const[a,b]of NM)s=s.replace(a,b);return s;}
function stripPref(s){s=s.replace(/^Υπεύθυνος πυρογράφου\s*:?\s*/,'Πυρογράφος: ');s=s.replace(/^Υπεύθ\.\s*:?\s*/,'');s=s.replace(/^Υπεύθυνος\s*:?\s*/,'');s=s.replace(/υπ\.\s*/g,'');return s;}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function isGrp(s){return /^\[.*\]$/.test(s.trim());}
function isKeno(s){return /^ΚΕΝΟ/.test(s.trim());}
const dateFor=i=>new Date(2026,6,14+i);
function mins(hm){const[h,m]=hm.split(':').map(Number);return h*60+m;}
let CUR=null;
function nowInfo(){const now=new Date();for(let i=0;i<8;i++){const d=dateFor(i);if(d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth()&&d.getDate()===now.getDate())return {idx:i,mins:now.getHours()*60+now.getMinutes()};}return null;}
function setActive(k){[...document.querySelectorAll('.tab')].forEach(t=>t.classList.toggle('active',t.dataset.k===String(k)));}
function evHTML(ev){
  const meal=MEALS[ev.title.trim()];
  let h='<div class="ev'+(meal?' meal':'')+(SPIR.test(ev.title)?' spir':'')+'"><div class="t">'+esc(ev.time)+'</div><div class="b">';
  h+='<div class="ti">'+(meal?'<span class="ic">'+meal+'</span>':'')+esc(ev.title)+'</div>';
  for(let de of ev.details){
    if(isKeno(de))continue;
    if(isGrp(de)){h+='<div class="de">'+esc(de.replace(/^\[|\]$/g,''))+'</div>';continue;}
    const line=stripPref(full(de));
    if(SPORT.test(de)){
      const mm=line.match(/^([^:]+):\s*(.*)$/);
      h+='<div class="de">'+(mm?'<span class="chip">'+esc(mm[1])+'</span> '+esc(mm[2]):'<span class="chip">'+esc(line)+'</span>')+'</div>';
    } else {
      const parts=line.split(/\s*\/\s*/);
      for(const pp of parts) h+='<div class="de">'+esc(pp)+'</div>';
    }
  }
  return h+'</div></div>';
}
function renderDay(idx){
  CUR=idx; const day=DAYS[idx];
  const m=day.header.match(/ΜΕΡΑ\s+(\d+)\s*—\s*(.*)/);
  let out='<div class="dayhead"><div class="mera">Μέρα '+(m?m[1]:'')+'</div><div class="meta">'+esc(m?m[2].trim():'')+'</div></div>';
  const ni=nowInfo(); const isToday=ni&&ni.idx===idx; let placed=false;
  const nowLine=()=>{const now=new Date();const hh=String(now.getHours()).padStart(2,'0'),mm=String(now.getMinutes()).padStart(2,'0');return '<div class="nowline"><span class="dot"></span><span class="pill">τώρα '+hh+':'+mm+'</span><span class="ln"></span></div>';};
  for(const ev of day.events){
    if(isToday&&!placed&&mins(ev.time)>ni.mins){out+=nowLine();placed=true;}
    out+=evHTML(ev);
  }
  if(isToday&&!placed) out+=nowLine();
  document.getElementById('view').innerHTML=out; setActive(idx); window.scrollTo({top:0});
}
function renderRoster(){
  CUR='r';
  let out='<div class="rhead">Ομάδες & Ομαδάρχες</div><div class="rsub">Όπως στην πρώτη σελίδα του αναλυτικού προγράμματος</div>';
  for(const t of ROSTER){
    out+='<div class="tm"><div class="num">'+t.n+'</div><div class="info"><div class="ld">'+esc(t.saint)+'</div><div class="lead">'+esc(t.leader)+'</div>'+(t.helper?'<div class="hp">βοηθός: '+esc(t.helper)+'</div>':'')+'</div></div>';
  }
  document.getElementById('view').innerHTML=out; setActive('r'); window.scrollTo({top:0});
}
function renderResp(){
  CUR='u';
  let out='<div class="rhead">Υπευθυνότητες</div><div class="rsub">Ανά τομέα — Αρχηγείο & Ομαδάρχες</div>';
  for(const r of RESP){
    out+='<div class="rcard"><div class="ra">'+esc(r.area)+'</div>';
    if(r.arx.length) out+='<div class="rr"><span class="rl">Αρχηγείο</span>'+esc(r.arx.join(' · '))+'</div>';
    if(r.omad.length) out+='<div class="rr"><span class="rl">Ομαδάρχες</span>'+esc(r.omad.join(' · '))+'</div>';
    out+='</div>';
  }
  document.getElementById('view').innerHTML=out; setActive('u'); window.scrollTo({top:0});
}
function defDay(){const n=nowInfo();if(n)return n.idx;return (new Date()<dateFor(0))?0:7;}
const dn=[14,15,16,17,18,19,20,21];
let th='<button class="tab" data-k="r" onclick="renderRoster()">👥 Ομαδάρχες</button><button class="tab" data-k="u" onclick="renderResp()">📋 Υπευθυνότητες</button>';
for(let i=0;i<8;i++)th+='<button class="tab" data-k="'+i+'" onclick="renderDay('+i+')">Μ'+(i+1)+'<span class="d">'+dn[i]+'/7</span></button>';
document.getElementById('tabs').innerHTML=th;
renderDay(defDay());
setInterval(()=>{if(typeof CUR==='number'){const n=nowInfo();if(n&&n.idx===CUR)renderDay(CUR);}},30000);
</script></body></html>
