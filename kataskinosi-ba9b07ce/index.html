const LIVES=[{"n": 1, "title": "Άγιος Σωφρόνιος του Έσσεξ", "paras": ["Ο Άγιος Σωφρόνιος του Έσσεξ, κατά κόσμον Σεργκέι Συμεών Ζαχάρωφ, γεννήθηκε το 1896 στη Μόσχα της Ρωσίας. Από τα παιδικά του χρόνια αγαπούσε την προσευχή και τη ζωή της Εκκλησίας. Όταν επέστρεφε από τον ναό, ένιωθε βαθιά χαρά και πολλές φορές έβλεπε ολόκληρο τον κόσμο να λούζεται από ένα ιδιαίτερο, ουράνιο φως, εμπειρίες που αργότερα κατάλαβε ότι ήταν δώρα του Θεού. Παράλληλα, είχε μεγάλο χάρισμα στη ζωγραφική και από μικρός ονειρευόταν να γίνει σπουδαίος καλλιτέχνης.", "Σπούδασε ζωγραφική στη Μόσχα και γρήγορα ξεχώρισε για το ταλέντο του. Όμως η εποχή στην οποία μεγάλωσε ήταν γεμάτη πολέμους, επαναστάσεις και ανθρώπινο πόνο. Ο Πρώτος Παγκόσμιος Πόλεμος, η Ρωσική Επανάσταση και ο εμφύλιος πόλεμος συγκλόνισαν τη χώρα του και τον έκαναν να αναρωτιέται ποιο είναι το πραγματικό νόημα της ζωής. Τον βασάνιζε ιδιαίτερα το ερώτημα αν ο άνθρωπος είναι πλασμένος μόνο για να πεθάνει ή αν υπάρχει αιώνια ζωή.", "Αναζητώντας απαντήσεις, αφιερώθηκε ακόμη περισσότερο στην τέχνη. Πίστευε ότι ίσως μέσα από τη ζωγραφική μπορούσε να αγγίξει το αιώνιο και να ανακαλύψει την αλήθεια. Μελέτησε διάφορα καλλιτεχνικά ρεύματα και φιλοσοφικές ιδέες, ενώ για ένα διάστημα στράφηκε ακόμη και σε ανατολικές θρησκείες, στη γιόγκα και στον διαλογισμό. Παρ' όλες όμως τις προσπάθειές του, η καρδιά του δεν έβρισκε ειρήνη. Κατάλαβε ότι καμία ανθρώπινη αναζήτηση δεν μπορούσε να γεμίσει το κενό που ένιωθε μέσα του.", "Το 1922 εγκατέλειψε τη Ρωσία και ταξίδεψε πρώτα στην Ιταλία, έπειτα στο Βερολίνο και τελικά εγκαταστάθηκε στο Παρίσι. Εκεί γνώρισε επιτυχία ως ζωγράφος και έργα του εκτέθηκαν σε σημαντικές εκθέσεις. Όσο όμως μεγάλωνε η φήμη του, τόσο περισσότερο ένιωθε ότι ο Θεός τον καλούσε σε διαφορετικό δρόμο. Σιγά σιγά συνειδητοποίησε ότι μόνο ο Χριστός είναι η αληθινή Ζωή και ότι η προσωπική σχέση μαζί Του δίνει απάντηση σε όλα τα υπαρξιακά ερωτήματα. Τότε άρχισε να προσεύχεται με όλη του την καρδιά.", "Μετά από έντονο εσωτερικό αγώνα αποφάσισε να εγκαταλείψει οριστικά τη λαμπρή καλλιτεχνική του καριέρα. Ο ίδιος έγραψε αργότερα ότι κατάλαβε πως η προσευχή τον οδηγούσε πολύ βαθύτερα στην αλήθεια από ό,τι η τέχνη. Έτσι άφησε τα πάντα και αναχώρησε για το Άγιο Όρος το 1925, αναζητώντας μια ζωή ολοκληρωτικά αφιερωμένη στον Θεό.", "Στη Μονή του Αγίου Παντελεήμονος έγινε μοναχός και έλαβε το όνομα Σωφρόνιος. Λίγα χρόνια αργότερα γνώρισε τον μεγάλο ασκητή Άγιο Σιλουανό τον Αθωνίτη. Η γνωριμία αυτή σημάδεψε ολόκληρη τη ζωή του. Ο Άγιος Σιλουανός έγινε ο πνευματικός του πατέρας και του δίδαξε με το παράδειγμά του την ταπείνωση, την αδιάλειπτη προσευχή και την αγάπη προς κάθε άνθρωπο. Ο Σωφρόνιος αργότερα κατέγραψε τη ζωή και τη διδασκαλία του γέροντά του, ώστε να γίνουν γνωστές σε όλη την Ορθόδοξη Εκκλησία.", "Μετά την κοίμηση του Αγίου Σιλουανού, ο πατήρ Σωφρόνιος συνέχισε την πνευματική του διακονία. Αργότερα εγκαταστάθηκε στην Αγγλία, όπου το 1959 ίδρυσε την Ιερά Σταυροπηγιακή Μονή του Αγίου Ιωάννη του Προδρόμου στο Έσσεξ. Η μονή έγινε τόπος προσευχής και πνευματικής αναγέννησης για ανθρώπους από πολλές χώρες και διαφορετικές γλώσσες. Εκεί ο Άγιος δίδασκε ότι κάθε άνθρωπος είναι μοναδικό πρόσωπο, πλασμένο για να ζει σε κοινωνία με τον Θεό και να αγαπά όλους τους ανθρώπους χωρίς διάκριση.", "Παρότι είχε εγκαταλείψει τη ζωγραφική ως επάγγελμα, δεν σταμάτησε ποτέ να υπηρετεί την Εκκλησία μέσω της ιερής τέχνης. Στη μονή δημιούργησε τοιχογραφίες και εικόνες, προσπαθώντας πάντοτε να εκφράσει τη θεολογία του ακτίστου φωτός και τη ζωντανή παρουσία του Χριστού. Για τον Άγιο Σωφρόνιο η εικόνα δεν ήταν απλώς ένα έργο τέχνης, αλλά μια μαρτυρία της Βασιλείας του Θεού και της μεταμορφωμένης ανθρώπινης ύπαρξης.", "Η ζωή του ήταν γεμάτη προσευχή, ταπείνωση και αγάπη. Πλήθος ανθρώπων τον επισκέπτονταν για συμβουλή και παρηγοριά. Δεν αναζητούσε ποτέ δόξα ή τιμές, αλλά προσπαθούσε να οδηγεί όλους στον Χριστό. Δίδασκε ότι ο χριστιανός δεν προσεύχεται μόνο για τον εαυτό του, αλλά για ολόκληρο τον κόσμο, γιατί η αγάπη του Θεού αγκαλιάζει κάθε άνθρωπο.", "Ο Άγιος Σωφρόνιος κοιμήθηκε στις 11 Ιουλίου 1993, αφήνοντας πίσω του σπουδαίο θεολογικό έργο, πλήθος πνευματικών παιδιών και μια ζωντανή μοναστική αδελφότητα που συνεχίζει μέχρι σήμερα το έργο του. Η αγία ζωή του αναγνωρίστηκε επίσημα από το Οικουμενικό Πατριαρχείο, το οποίο το 2019 τον κατέταξε στο Αγιολόγιο της Ορθόδοξης Εκκλησίας. Σήμερα τιμάται ως ένας από τους μεγάλους σύγχρονους αγίους, που με τη ζωή και τη διδασκαλία του έδειξε ότι ο αληθινός δρόμος προς την πληρότητα της ύπαρξης είναι η προσωπική κοινωνία με τον Χριστό και η αγάπη προς κάθε άνθρωπο.", "Εορτάζεται στις 11 Ιουλίου.", "Ἀπολυτίκιον (Ἦχος γ' - Θείας πίστεως):\n«Πλήρης χάριτος καὶ ἀληθείας, φῶς γενόμενος θεολογίας, προφητικῶς τὸν σὸν βίον διήνυσας· τὸν Ἐνυπόστατον Λόγον ἑώρακας, καὶ σωτηρίας ὁδοὺς ἡμῖν ἐγνώρισας. Πάτερ, πρέσβευε ἀεὶ τῷ Θεῷ δωρήσασθαι, Σωφρόνιε, ἡμῖν τὸ μέγα ἔλεος»"]}, {"n": 2, "title": "Άγιος Σιλουανός ο Αθωνίτης", "paras": ["Ό όσιος Σιλουανός ο Άθωνίτης (Σιλουανός, εκ του λατινικού silva προερχόμενο το όνομα, δασώδης ερμηνεύεται, όθεν και με παρόμοιας εννοίας ερμηνεύεται ο νέος ούτος της Εκκλησίας δρυμός αρετών πολυειδών και πολυτρόπως βλαστανόντων χαρισμάτων) είναι από τους τελευταίους καρπούς που πρόσφερε ο ιερός  Άθωνας προς την Οικουμένη.", "Γεννήθηκε το 1866 από ευσεβείς, μεγάλης αρετής, γονείς στο χωριό Σόβσκ του Ταμπώφ, στην Ρωσία. Στο άγιο Βάπτισμα έλαβε το όνομα Συμεών. Σιλουανός ονομάστηκε κατά τη μοναχική του αφιέρωση, το 1896, στο Μοναστήρι του αγίου Μεγαλομάρτυρος Παντελεήμονος, το επιλεγόμενο Ρωσικό, στο Άγιο Όρος, όπου και διέμεινε όλη την υπόλοιπη επίγεια ζωή του, μέχρι τις 11/24 Σεπτεμβρίου του έτους 1938, ημέρα Σαββάτου. Μετά από πενήντα χρόνια, ο οικουμενικός πατριάρχης Δημήτριος, με Συνοδική πράξη της 26ης Νοεμβρίου 1987, τον συναρίθμησε επισήμως με τους λοιπούς οσίους και αγίους της Ορθοδοξίας και καθιέρωσε την επ’ εκκλησίας μνήμη του στις 24 Σεπτεμβρίου, ημέρα της κοιμήσεώς του.", "Η ζωή του οσίου καθώς και τα θεόπνευστα λόγιά του παραδόθηκαν, από το έτος 1948, στους πιστούς, από τον επιστήθιο μαθητή του Άγιο Σωφρόνιο (+ 1993), κτήτορα της Μονής του Τιμίου Προδρόμου στο Έσσεξ της Αγγλίας. Έκτοτε ακολούθησαν επανειλημμένες εκδόσεις στις περισσότερες ευρωπαϊκές γλώσσες που κατέστην τον όσιο Σιλουανό οικουμενικό διδάσκαλο της εν Αγίω Πνεύματι ορθοδόξου ζωής.", "Η επίγεια ζωή του φαινομενικά μπορεί να χαρακτηριστεί απλοϊκή. Στον κόσμο έζησε όπως οι περισσότεροι συνομήλικοί του. Στο Μοναστήρι πέρασε σαράντα δύο χρόνια, με την καθημερινότητα στο διακόνημα, τις εκκλησιαστικές ακολουθίες και τη ζωή στο κελί, όπως όλοι οι αγιορείτες μοναχοί. Είχε όμως κρυφή εργασία, φιλόπονη και αιματηρή, που δεν φαίνεται αφού ενεργείται στο βάθος της καρδίας. Αυτός, ο εν τω κρύπτω αγώνας της μετανοίας, της ταπεινώσεως και της θεογνωσίας, του απέδωσε καρπούς πολλούς και θησαυρούς που δεν είναι εύκολο ούτε να κλαπούν ούτε να διαφθαρούν (πρβλ. Ματ. 6, 19-21). Σε νεαρή ηλικία άκουσε τη φωνή της Θεοτόκου και όταν ήταν ακόμα δόκιμος είδε τον ζώντα Χριστό. Το φως της θεογνωσίας συντρόφευε πάντα την προσευχή του.", "Μετά την ανακομιδή των τιμίων λειψάνων του, στο μέτωπο του ιερού του κρανίου εγράφη με κιννάβαρι στα ρωσικά «Γέρων Σιλουανός, Μεγαλόσχημος μοναχός» και τοποθετήθηκε μαζί με τις κάρες των άλλων πατέρων, στο οστεοφυλάκιο της Μονής του Αγίου Παντελεήμονος. Από τα υπόλοιπα λείψανα κάποια μέρη πήρε και ο πατήρ Σωφρόνιος. Τα άλλα ανακατεύτηκαν με τους λοιπούς πατέρες, κατά την αγιορείτικη συνήθεια.", "Περί το 1970 παρουσιάστηκαν στην τίμια κάρα ρανίδες μύρου, γεγονός που παρατηρήθηκε από πολλούς και έκανε τον ηγούμενο να την μεταφέρει, αφού την τοποθέτησε σε ξύλινη θήκη, στον ναό της Αγίας Σκέπης, μέσα στο μοναστήρι, δίπλα στα άμφια του αγίου Ιωάννου της Κρονστάνδης. Έκτοτε η αγία κάρα αποπνέει μία ιδιαίτερη ευωδία, καρπό του Αγίου Πνεύματος.", "Τελευταία τοποθετήθηκε στην παλαιά λειψανοθήκη του Αγίου Παντελεήμονος και προσκυνείται μαζί με τα άλλα άγια λείψανα της Μονής. Αργότερα, με πρωτοβουλία του μακαριστού πλέον καθηγητή ιατρού Γιώργου Παπαζάχου και δαπάναις πνευματικών τέκνων του πατρός Σωφρονίου, τοποθετήθηκε η αγία κάρα σε νέα ασημένια λειψανοθήκη. Αλλά και αυτή η λειψανοθήκη περικλείσθηκε σε άλλη, πιο πλούσια και πιο περίτεχνα διακοσμημένη.", "Πολλά είναι τα θαύματα που διενήργησε και εν ζωή και μετά θάνατον ο όσιος Σιλουανός. Αλλά το μεγαλύτερο θαύμα είναι ότι τα γραπτά του και ο βίος του οδήγησαν και οδηγούν πολλούς στην όντως γνήσια πνευματική ζωή. Και βέβαια εκείνο πού διδάσκει είναι αυτό που ο ίδιος διά βίου έζησε. Τον κρυφό αγώνα της καρδιάς, για την απόκτηση του Αγίου Πνεύματος και την αληθινή θεογνωσία. Σ’ αυτόν τον πνευματικό αγώνα καλεί τον άνθρωπο ο όσιος Σιλουανός.", "Εορτάζει στις 24 Σεπτεμβρίου.", "Ἀπολυτίκιον\nἮχος γ'. Θείας πίστεως.\nΚήρυξ δέδοσαι, τῇ οἰκουμένῃ, σὺ γλυκύτατος, ἐν θεολόγοις, τῆς τοῦ Χριστοῦ ἀγάπης τρισόλβιε· τὸν Ταπεινὸν γὰρ καὶ Πρᾷον ἑώρακας, καὶ τὴν Ἐκείνου καρδίαν κατέμαθες. Ὅθεν ἅπαντες, Σιλουανὲ ἐλλαμπόμενοι, τοῖς θεογλώσσοις ῥήμασι, δοξάζομεν τὸ Πνεῦμα τὸ δοξάσαν σε."]}, {"n": 3, "title": "Ἅγιος Λουκᾶς, Ἀρχιεπίσκοπος Συμφερουπόλεως καὶ Κριμαίας, ὁ ἰατρός", "paras": ["Βιογραφικὰ στοιχεῖα", "Ὁ Ἅγιος Λουκᾶς Συμφερουπόλεως καὶ Κριμαίας (κοσμικὸ ὄνομα Валентин Феликсович Войно-Ясенецкий, Βαλεντὶν Βόϊνο-Γιασενέτσκι) γεννήθηκε τὸ 1877 στὸ Κέρτς τῆς Κριμαίας. Παντρεύτηκε τὴ νοσοκόμα Ἄννα Βασιλίγιεβνα μὲ τὴν ὁποία ἀπέκτησαν τέσσερα παιδιά. Σὲ ἡλικία 38 ἐτῶν ἔχασε τὴ σύζυγό του ἀπὸ φυματίωση. Δὲν ξαναπαντρεύτηκε, καὶ ἐπισκεπτόταν τὸν τάφο της συχνά, ὅταν τὸ ἐπέτρεπαν οἱ συνθῆκες τῆς ταραχώδους ζωῆς του.", "Ἐπιστημονικὴ πορεία", "Τὸ 1920 ἐξελέγη καθηγητὴς τῆς ἀνατομίας καὶ χειρουργικῆς στὸ Πανεπιστήμιο τῆς Τασκένδης. Σὲ ὅλη του τὴ ζωὴ ἦταν ἀπὸ λίγο ἕως ἐξαιρετικὰ φτωχός, καθὼς εἴτε ὁ μισθός του ἦταν μικρός, εἴτε βρισκόταν στὴ φυλακή, εἴτε ὅταν τοῦ πρόσφεραν χρήματα γιὰ κάποια θεραπεία ὑποδείκνυε ἄλλα πρόσωπα καὶ ζητοῦσε τὰ χρήματα νὰ δοθοῦν ἀπ᾿ εὐθείας σὲ αὐτά.", "Ὁ ἅγιος Λουκᾶς ὡς ἰατρὸς δημοσίευσε σαράντα ἐπιστημονικὰ ἔργα. Εἶναι χαρακτηριστικὸ ὅτι τὰ πρῶτα 12 χρόνια τῆς δραστηριότητάς του εἶχε ἤδη δημοσιεύσει τὰ δεκαεννέα ἀπὸ τὰ σαράντα ἔργα του. Τὸν ἀπασχολοῦσε πολὺ ἡ γενικὴ ἀναισθησία, ποὺ ὅπως ἔλεγε, τὴν ἐποχὴ ἐκείνη «ἦταν πολὺ πιὸ ἐπικίνδυνη ἀπὸ τὴν ἴδια τὴν χειρουργικὴ ἐπέμβαση». Γύρω στὸ 1909 κατάφερε νὰ βρεῖ ἕναν ἁπλὸ καὶ σίγουρο μαζὶ τρόπο νὰ γίνεται ἔνεση στὸ σημεῖο ἐξόδου τοῦ ἰσχιακοῦ νεύρου ἀπὸ τὸν κλωβὸ τῆς λεκάνης, καὶ τρόπο ἐφαρμογῆς τῆς μεθόδου αὐτῆς τῆς τοπικῆς ἀναισθησίας στὴν ἄκρα χείρα. Μὲ τὴ δική του μέθοδο ἔκανε 538 ἐγχειρήσεις μὲ μεγάλη ἐπιτυχία. Τότε ἦταν 33 ἐτῶν.", "Ἔκανε μεγάλες ἀνακαλύψεις σὲ ἀντίξοες συνθῆκες. Τὸ ἐπαρχιακὸ νοσοκομεῖο τοῦ χωριοῦ Ῥομάνοφκα - οἱ κάτοικοι τοῦ ὁποίου μεθοῦσαν συχνὰ δημιουργώντας αἱματηρὰ ἐπεισόδια, ἐνῶ ἀσθένειες σύφιλης καὶ πνευμονίας θέριζαν τὸν πληθυσμό - δεχόταν κάθε χρόνο 31.640 ἀσθενεῖς, σύμφωνα μὲ τὰ ἐπίσημα ἔγγραφα. Οἱ γιατροὶ δέχονταν 25-30 ἀσθενεῖς τὴν ὥρα, καὶ πολλὲς φορὲς παραπάνω. Οἱ χῶροι ἦταν φρικτοί, μικροὶ καὶ ἀποπνικτικοί, ὥστε πολλοὶ λιποθυμοῦσαν, καὶ στὸ ἴδιο δωμάτιο τρεῖς γιατροὶ δέχονταν ταυτόχρονα τρεῖς διαφορετικοὺς ἀσθενεῖς. Ἔπειτα ἀπὸ τὴ βάρδια στὸ νοσοκομεῖο ἔπρεπε νὰ ἐπισκέπτονται μὲ τὸ ἄλογο τὰ χωριά, νὰ ἐξετάζουν ἀσθενεῖς καὶ νὰ κάνουν ἐπιτόπου χειρουργικὲς ἐπεμβάσεις. Κάτω ἀπὸ αὐτὲς τὶς συνθῆκες, ὁ Βαλεντὶν ἐργαζόταν ἐντατικὰ στὰ ἐξωτερικὰ ἰατρεῖα, περιόδευε στὰ χωριὰ καὶ ἀνέλαβε καὶ τὸ χειρουργικὸ τμῆμα. Μέσα σ᾿ ἕνα χρόνο ἔκανε 300 χειρουργικὲς ἐπεμβάσεις, τὴν ἐμπειρία ἀπὸ τὶς ὁποῖες δημοσίευσε σὲ μία μικρὴ μελέτη. Παράλληλα κατὰ τὴν περίοδο τῶν ἀδειῶν του στὴ Μόσχα συνέχιζε τὶς μελέτες του γιὰ τὴν τοπικὴ ἀναισθησία. Γράφει ὁ ἴδιος:", "«Δούλευα ἀπὸ τὸ πρωὶ ὡς τὸ βράδυ στὸ Ἰνστιτοῦτο τοῦ καθηγητῆ Καρουζὶν καὶ στὴν ἕδρα τῆς περιγραφικῆς ἀνατομίας. Ἐκεῖ μελέτησα περίπου 300 κρανία καὶ βρῆκα ἕναν πρωτόγνωρο τρόπο νὰ γίνεται ἡ ἔνεση στὸν δεύτερο κλάδο τοῦ τριδύμου νεύρου, στὴν ἄμεση ἔξοδό του ἀπὸ τὸ στρογγυλὸ τμῆμα.»", "Ἕνα κλασικὸ ἔργο του, τὸ ὁποῖο ἐκδόθηκε τὸ 1934 εἶναι τὸ βιβλίο Δοκίμια γιὰ τὴν χειρουργικὴ τῶν πυογόνων λοιμώξεων, τὸ ὁποῖο τιμήθηκε μὲ τὸ Βραβεῖο Στάλιν, τὴν κορυφαία διάκριση τῆς προπολεμικῆς Ῥωσίας. Τὸ βιβλίο ἄνοιγε νέους ὁρίζοντες στὴν ἰατρικὴ τῆς ἐποχῆς, καὶ παρότι στὶς τρεῖς πρῶτες ἐκδόσεις κυκλοφόρησε σὲ 60.000 ἀντίτυπα, κάθε φορὰ χρειαζόταν νὰ ἀνατυπωθεῖ. Ὁ καθηγητὴς Ζήκωφ ἔγραφε τὸ 1954:", "«Τὰ βιβλία τοῦ Βόινο-Γιασενέτσκι εἶχαν μεγάλη σημασία γιὰ μᾶς τοὺς μελλοντικοὺς ἐπιστήμονες. Εἶχαν ἰδιαίτερο ἐνδιαφέρον διότι συνοδεύονταν ἀπὸ σκίτσα καὶ φωτογραφίες κι ἔτσι εἴχαμε καλύτερη εἰκόνα γιὰ τὸ πῶς ἐφαρμόζονται στὴν πράξη οἱ μέθοδοί του. Ὁ ἴδιος εἶχε φωτογραφικὴ μηχανὴ καὶ φωτογράφιζε τὴν πορεία τῆς ἐγχείρησης ὅταν χρειαζόταν. Τὰ σκίτσα του ἦταν ἀξιοθαύμαστα.....»", "Ὅμως στὸ βιβλίο αὐτὸ δὲν φαινόταν μόνο ἡ ἐπιστημονικὴ κατάρτιση τοῦ συγγραφέα, ἀλλὰ καὶ ἡ ἀγάπη του γιὰ τοὺς ἀσθενεῖς. Σὲ ἕνα σημεῖο γράφει:", "«Ξεκινώντας τὴν ἐξέταση, ὁ γιατρὸς πρέπει νὰ ἔχει ὑπόψη του ὄχι μόνο τὴν κοιλιακὴ χώρα, ἀλλὰ τὸν ἀσθενῆ ἐξ ὁλοκλήρου, τὸν ὁποῖο δυστυχῶς οἱ γιατροὶ συνήθως ἀποκαλοῦν ῾περίπτωση᾿. Ὁ ἄνθρωπος φοβᾶται καὶ εἶναι ἀπελπισμένος, ἡ καρδιά του σπαρταρᾶ, ὄχι μόνο μὲ τὴν κυριολεκτικὴ σημασία τῆς λέξης, ἀλλὰ καὶ μὲ τὴ μεταφορική της σημασία. Γι᾿ αὐτὸ πρέπει νὰ δυναμώσετε τὴν καρδιά του ὄχι μόνο μὲ κάμφορα ἢ digulen, ἀλλὰ πρέπει νὰ ἀπαλλάξετε τὸν ἀσθενῆ ἀπὸ τὸ ἄγχος καὶ τὴν ψυχολογικὴ φόρτιση. Ὁ ἀσθενὴς δὲν πρέπει νὰ δεῖ τὸ χειρουργικὸ τραπέζι, τὰ ἕτοιμα ἐργαλεῖα, τοὺς ἀνθρώπους μὲ ἰατρικὲς μπλοῦζες, μὲ τὶς μάσκες στὰ πρόσωπα καὶ τὰ γάντια στὰ χέρια. Κοιμῆστε τον ἐκτὸς του χώρου τοῦ χειρουργείου. Ἐπίσης φροντίστε νὰ εἶναι ζεστὸς καθ᾿ ὅλη τὴ διάρκεια τῆς ἐγχειρήσεως, διότι εἶναι πάρα πολὺ σημαντικό.»", "Οἱ κριτικὲς γι᾿ αὐτὸ τὸ βιβλίο εἶναι ἐνθουσιώδεις ἀκόμα καὶ στὰ πρόσφατα χρόνια.", "Ὁ ἅγιος Λουκᾶς ἦταν πάντοτε πιστὸς Χριστιανός. Δὲν ἔχανε λειτουργία καὶ παρακολουθοῦσε ὄρθιος ὅλες τὶς παννυχίδες καὶ τοὺς ὄρθρους, τὰ Σάββατα, τὶς Κυριακὲς καὶ τὶς ἡμέρες τῶν ὀρθοδόξων γιορτῶν. Στὸ χειρουργεῖο εἶχε πάντα τὴν εἰκόνα τῆς Παναγίας μπροστὰ στὴν ὁποία προσευχόταν γιὰ λίγα λεπτὰ πρὶν ἀπὸ κάθε ἐπέμβαση. Ἔπειτα, μ᾿ ἕνα βαμβάκι ποτισμένο στὸ ἰώδιο, ἔκανε τὸ σημεῖο τοῦ σταυροῦ στὸ σῶμα τοῦ ἀσθενοῦς, ἐκεῖ ποὺ θὰ γινόταν ἡ τομή. Μόνο μετὰ ἀπὸ αὐτὰ ἔλεγε μὲ ἐπισημότητα «τὸ νυστέρι». Οἱ ἄθεοι συνάδελφοί του γρήγορα τὸν συνήθιζαν καὶ δὲν ἔδιναν σημασία, ἐνῶ οἱ θρησκευόμενοι τὰ ἔβρισκαν αὐτὰ πολὺ φυσικά.", "Ὅμως στὶς ἀρχὲς τοῦ 1920 μία ἀπὸ τὶς ἐπιτροπὲς ἐλέγχου τοῦ νοσοκομείου ὅπου ἐργαζόταν τότε, ἔδωσε ἐντολὴ νὰ ξεκρεμάσουν τὴν εἰκόνα τῆς Παναγίας, μὲ ἀποτέλεσμα ὁ ἅγιος Λουκᾶς νὰ ἀρνεῖται νὰ μπεῖ στὸ χειρουργεῖο. Παράλληλα, ἡ σύζυγος ἑνὸς ἀπὸ τὰ στελέχη τοῦ κόμματος εἰσήχθη στὸ νοσοκομεῖο ὡς ἔκτακτο περιστατικό, καὶ ζητοῦσε νὰ χειρουργηθεῖ μόνο ἀπὸ τὸν Βόινο-Γιασενέτσκι, κι ἔτσι ὁ σύζυγός της τοῦ ὑποσχέθηκε ὅτι ἂν ἡ ἐγχείρηση γινόταν, τὴν ἑπόμενη μέρα ἡ εἰκόνα θὰ ἦταν στὴ θέση της. Ἡ ἐγχείρηση ἔγινε κι ἦταν ἐπιτυχής, καὶ ὁ σύζυγος τῆς ἄρρωστης κράτησε τὴν ὑπόσχεσή του.", "Τὸ 1921 ὁ Βαλεντὶν Βόινο-Γιασενέτσκι χειροτονήθηκε ἱερέας καὶ ἀργότερα (1923) Ἐπίσκοπος Τασκένδης. Ἀπὸ τότε συνδύαζε ποιμαντικὰ καὶ ἱερατικὰ καθήκοντα. Παρέμεινε ἀρχίατρος τοῦ Γενικοῦ Νοσοκομείου Τασκένδης, χειρουργοῦσε καθημερινὰ καὶ παρέδιδε μαθήματα στὴν Ἰατρικὴ Σχολή, πάντα μὲ τὸ ράσο καὶ τὸ σταυρό του. Ἀπὸ τὸ 1922 καὶ μέχρι τὴν τελευταία του πνοὴ γνώρισε συλλήψεις, βασανιστήρια, ἐξορίες καὶ κακουχίες. Φυλακίστηκε καὶ ἐξορίστηκε συνολικὰ ἕντεκα χρόνια. Σὲ ὅλο αὐτὸ τὸ διάστημα ἐξασκοῦσε τὴν ἰατρικὴ βοηθώντας ὅσους εἶχαν ἀνάγκη.", "Οἱ λόγοι τῶν διώξεών του ἦταν, οἱ γενικοὶ διωγμοὶ κατὰ τῶν Ὀρθοδόξων καὶ ἡ ἰδιαίτερη ἄρνηση τοῦ ἐπισκόπου Λουκᾶ νὰ ὑποστηρίξει τὴ «Ζωντανὴ Ἐκκλησία», ἕνα ἐκκλησιαστικὸ πραξικόπημα μέσω τοῦ ὁποίου τὸ σοβιετικὸ καθεστὼς προσπαθοῦσε νὰ ἐλέγξει τοὺς πιστούς. Σοβαρὸ λόγο ἔπαιξε καὶ ἡ ἀντιπάθεια ἑνὸς κομματικοῦ στελέχους ὀνόματι Πέτερς, ὁ ὁποῖος ἤθελε νὰ καταδικάσει σὲ θάνατο κάποιους γιατροὺς ποὺ ἀντιμετώπιζαν κατηγορίες ἀδιαφορίας ἀπέναντι σὲ ἀσθενεῖς, ἀλλὰ στὴν πολύκροτη δίκη ποὺ ἀκολούθησε δὲν τὰ κατάφερε, ἐξαιτίας τῆς κατάθεσης τοῦ ἐπισκόπου Λουκᾶ. Οἱ ταλαιπωρίες αὐτὲς οὐσιαστικὰ κατέστρεψαν τὴν ὑγεία τοῦ ἁγίου Λουκᾶ, ὁ ὁποῖος τὰ τελευταῖα ἐννέα ἔτη τῆς ζωῆς τοῦ ἦταν τυφλὸς ἀπὸ γλαύκωμα.", "Στὴ διάρκεια τοῦ Δευτέρου Παγκοσμίου Πολέμου διηύθυνε τὸ στρατιωτικὸ νοσοκομεῖο τοῦ Κρασνογιάρσκ, ἐνῶ ἦταν καὶ ἐπίσκοπος τῆς πόλης αὐτῆς. Ἀπὸ τὸ 1946 μέχρι τὸ 1961 ποὺ πέθανε, ἦταν μητροπολίτης τῆς Συμφερούπολης. Παράλληλα τὸ 1947 τοῦ ἀπαγορεύθηκε νὰ μιλᾶ στοὺς φοιτητές, σταμάτησαν νὰ τὸν καλοῦν στὰ ἰατρικὰ συμβούλια καὶ τὸν ἀπέλυσαν ἀπὸ ἰατρικὸ σύμβουλο, ἐπειδὴ «γνώριζαν ὅτι δὲν εἶχε καθαρὸ παρελθόν: φυλακές, ἐξορίες, κηρύγματα» κι ἐπειδὴ ἀρνιόταν νὰ πηγαίνει χωρὶς τὸ ράσο καὶ τὸ σταυρό του στὴν ἐργασία του καὶ σὲ αὐτὲς τὶς ἐκδηλώσεις. Καθὼς ὅμως ἐκεῖνος ἐνδιαφερόταν γιὰ τὸν ἀνθρώπινο πόνο, ἔβγαλε ἀνακοίνωση ὅτι «δέχεται καθημερινὰ ἐκτὸς Κυριακῶν καὶ ἑορτῶν, κάθε ἄνθρωπο ποὺ θέλει τὴ βοήθειά του», μὲ ἀποτέλεσμα νὰ καταφθάνουν στὸ διαμέρισμά του καθημερινὰ ἀμέτρητοι ἄνθρωποι ἀπ᾿ ὅλη τὴν Κριμαία.", "Ὁ ἀρχιεπίσκοπος Λουκᾶς φέρεται ἀπὸ τοὺς πιστοὺς νὰ ἐμφάνισε πολλὰ πνευματικὰ χαρίσματα ὅσο ἀκόμα ζοῦσε. Ὑπάρχουν καταγεγραμμένες μαρτυρίες ἀσθενῶν, ὅτι ἔκανε ὀρθὴ διάγνωση τῆς ἀσθένειάς τους μὲ τὸ ποὺ τοὺς ἔβλεπε, ἐνῶ ἄλλοι γιατροὶ ποὺ τοὺς εἶχαν ἐξετάσει τοὺς ἔβρισκαν ὑγιεῖς. Πολλοὶ ἔχουν ἐπίσης δηλώσει ὅτι διαπίστωσαν ὅτι εἶχε διορατικὸ χάρισμα, κι ἄλλοι ὅτι τοὺς θεράπευσε μὲ τὴν προσευχή του, ἰδίως κατὰ τὰ τελευταῖα χρόνια της ζωῆς του ποὺ δὲν ἔβλεπε πλέον γιὰ νὰ χειρουργεῖ.", "Τελευταῖα λόγια τοῦ Ἁγίου Λουκᾶ", "(μαγνησκοπήθηκε καὶ παρουσιάζεται ἐδῶ ἡ ἀκριβὴς μετάφρασή τους)", "Παιδιά μου πολὺ σᾶς παρακαλῶ, ντυθεῖτε μὲ τὴν πανοπλία ποὺ δίνει ὁ Θεός, γιὰ νὰ μπορέσετε νὰ ἀντιμετωπίσετε τὰ τεχνάσματα τοῦ διαβόλου. Δὲν μπορεῖτε νὰ φανταστεῖτε πόσο πονηρὸς εἶναι. Δὲν ἔχουμε νὰ παλέψουμε μὲ ἀνθρώπους, ἀλλὰ μὲ ἀρχὲς καὶ ἐξουσίες, δηλαδὴ μὲ τὰ πονηρὰ πνεύματα. Προσέξτε! Τὸν διάβολο δὲν τὸν συμφέρει νὰ δεχθεῖ κανεὶς τὴν ὕπαρξή του, νὰ σκέφτεται καὶ νὰ αἰσθάνεται ὅτι εἶναι κοντὰ στὸν ἄνθρωπο. Ἕνας κρυφὸς καὶ ἄγνωστος ἐχθρὸς εἶναι πιὸ ἐπικίνδυνος ἀπὸ ἕναν ὁρατὸ ἐχθρό. Ὢ πόσο μεγάλος καὶ τρομερὸς εἶναι ὁ στρατὸς τῶν δαιμόνων. Πόσο ἀμέτρητο εἶναι τὸ μαῦρο τους πλῆθος! Ἀμετάβλητα, ἀκούραστα, μέρα καὶ νύχτα, ἐπιδιώκουν νὰ σπρώξουν ὅλους ἐμᾶς ποὺ πιστεύουμε στὸ ὄνομα τοῦ Χριστοῦ, νὰ μᾶς παρασύρουν στὸ δρόμο τῆς ἀπιστίας τῆς κακίας καὶ τῆς ἀσέβειας. Αὐτοὶ οἱ ἀόρατοι ἐχθροὶ υοῦ Θεοῦ, ἔχουν βάλει ὡς μοναδικό τους σκοπὸ μέρα καὶ νύχτα νὰ ἐπιδιώκουν τὴν καταστροφή μας. Ὅμως μὴ φοβᾶστε, πάρτε δύναμη ἀπὸ τὸ ὄνομα τοῦ Ἰησοῦ.", "Ἐκοιμήθη στὶς 11 Ἰουνίου τοῦ 1961. Οἱ ἀρχὲς ἀπαγόρευσαν τὴν ἐκφορὰ τοῦ νεκροῦ μὲ τὰ πόδια ἀπὸ τοὺς κεντρικοὺς δρόμους τῆς πόλης, πράγμα ποὺ προκάλεσε τὴ λαϊκὴ ἀγανάκτηση ἀκόμα καὶ τῶν ἀλλοδόξων. Τελικὰ οἱ ἀρχὲς ἀναγκάστηκαν νὰ ὑποχωρήσουν, ἡ ἐκφορὰ ἔγινε στὴν κεντρικὴ λεωφόρο της Συμφερούπολης καὶ διήρκεσε τρισήμιση ὧρες. Τὴ νεκρικὴ πομπὴ ἀκολούθησε πλῆθος κόσμου, ἡ κυκλοφορία σταμάτησε, ἐνῶ τὰ μπαλκόνια, οἱ ταράτσες καὶ τὰ δέντρα ἀκόμα, ἦταν γεμάτα ἀνθρώπους. Εκείνη τη μέρα,  φέρεται νὰ σημειώθηκε ἕνα παράδοξο γεγονός, μὲ ἕνα σμῆνος περιστεριῶν ποὺ ἔκανε ἐπὶ ὧρες κύκλους πάνω ἀπὸ τὸ λείψανο, μέχρις ὅτου ἡ πομπὴ ἔφτασε στὸ νεκροταφεῖο. Τὸν Νοέμβριο τοῦ 1995 ἀνακηρύχθηκε ἅγιος μὲ ἀπόφαση τῆς Οὐκρανικῆς Ὀρθόδοξης Ἐκκλησίας, ἀφοῦ πρῶτα εἰδικὴ ἐπιτροπὴ ἀσχολήθηκε μὲ τὴ ζωή, τὰ ἔργα καὶ τὰ θαύματά του τὰ ὁποῖα καταγράφονταν καὶ μετὰ τὸν θάνατό του. Στὶς 17 Μαρτίου 1996 ἔγινε ἡ ἀνακομιδὴ τῶν λειψάνων του ἀπὸ τὸν ἀρχιεπίσκοπο Λάζαρο καὶ μέλη τῆς ἐπιτροπῆς, μπροστὰ σὲ 40.000 περίπου παρευρισκόμενους. Λέγεται ὅτι βρέθηκαν ἡ καρδιά του καὶ τμήματα τοῦ ἐγκεφάλου του ἀδιάφθορα, ἐνῶ ἄρρητος εὐωδία ἐξερχόταν ἀπὸ τὰ λείψανά του. Τὸ ἴδιο ἔτος ἀποφασίστηκε νὰ διοργανώνεται κάθε χρόνο Ἰατρικὸ Συνέδριο στὴν Συμφερούπολη σὲ συνεργασία τῆς Ἱερᾶς Μητροπόλεως μὲ τὸ Κρατικὸ Πανεπιστήμιο τῆς Κριμαίας πρὸς τιμήν του.", "Ἡ μνήμη του ἑορτάζεται στὶς 11 Ἰουνίου.", "Απολυτίκιο (Ἦχος πλ. αʹ - Τὸν συνάναρχον Λόγον)", "Ἰατρὸν καὶ ποιμένα, Λουκᾶ τιμήσωμεν,\nΣυμφερουπόλεως ποίμνης, Ἀρχιερέα λαμπρόν,\nτὸν βαστάσαντα Χριστοῦ τὰ θεῖα στίγματα,\nτὰς ἐξορίας, τὰ δεινά, ἐγκλεισμοὺς ἐν φυλακαῖς,\nτὰς θλίψεις καὶ τὰ ὀνείδη,\nτὸν ἐπ' ἐσχάτων φανέντα, ἐν τῇ Ρωσίᾳ νέον Ἅγιον."]}, {"n": 4, "title": "Άγιος Φιλούμενος ο Νεοϊερομάρτυρας", "paras": ["Ο Άγιος Φιλούμενος, κατά κόσμον Σοφοκλής Ορουντιώτης, ήταν γέννημα και θρέμμα της αγιοτόκου νήσου Κύπρου. Γεννήθηκε στις 15 του Οκτώβρη του έτους 1913 στην ενορία του Αγίου Σάββα στη Λευκωσία. Η καταγωγή του όμως ήταν από το χωριό της επισκοπής Μόρφου, Ορούντα. Γόνος ευλαβών γονέων –του Γεωργίου και της Μαγδαληνής Χασάπη- και «υποτακτικός» της ευλογημένης γιαγιάς του Αλεξάνδρας, ο Άγιος Φιλούμενος μυήθηκε από πολύ νωρίς σ’ ένα μοναχικό τυπικό ζωής.", "Κατά την παιδική του ηλικία έμαθε να προσεύχεται, να νηστεύει, να εκκλησιάζεται και να μελετά την Αγία Γραφή και τα συναξάρια με τους βίους των Αγίων. Ιδιαίτερα του άρεσε να διαβάζει το βίο του Αγίου Ιωάννου του Καλυβίτου, του οποίου η ζωή τόσο τον είχε θέλξει, ώστε άναψε μέσα του έντονη η επιθυμία να αναχωρήσει εκ του κόσμου για να ζήσει την κατά Θεό μοναχική ζωή.", "Έτσι, το καλοκαίρι του 1927 εγκατέλειψε, μαζί με τον αδελφό του Αλέξανδρο (τον μετέπειτα ιερομόναχο Ελπίδιο), το πατρικό του σπίτι και πήγε στο Σταυροβούνι όπου παρέμεινε για 5 χρόνια υποτασσόμενος «εν παντί» στον τότε ηγούμενο, μοναχό Βαρνάβα.", "Το 1934 αναχώρησε, μαζί με τον αδελφό του, από τη Μονή  του Σταυροβουνιού και μετέβη στα Ιεροσόλυμα για να εγγραφεί στο Γυμνάσιο του εκεί Πατριαρχείου. Στον τρίτο χρόνο φοίτησής του στο Γυμνάσιο εκάρη μοναχός, από τον τότε Πατριάρχη Τιμόθεο Θέμελη και λίγους μήνες μετά χειροτονήθηκε διάκονος. Το 1943 χειροτονήθηκε πρεσβύτερος και έξι χρόνια αργότερα έλαβε και το οφφίκιο του Αρχιμανδρίτη.", "Αποφοιτώντας από τη Σχολή του Πατριαρχείου ο Άγιος Φιλούμενος, παρέμεινε στα Ιεροσόλυμα όπου υπηρέτησε, ως μέλος της Αγιοταφικής αδελφότητας, για 45 συνεχή χρόνια. Σ’ αυτά τα χρόνια διορίστηκε ως ηγούμενος σε διάφορα προσκυνήματα –στην Τιβεριάδα, στην Ιόππη, στη Μονή του Αρχαγγέλου, στη Ραμάλλα, στον Αββά Θεοδόσιο, στον Προφήτη Ηλία, στο Φρέαρ του Ιακώβ- απ’ όπου διακόνησε με πολλή αγάπη και πόνο το εκάστοτε ποίμνιό του.", "Ο κόσμος, και κυρίως οι απλοί άνθρωποι με τους οποίους συναναστρεφόταν καθημερινά, στηρίζοντάς τους πνευματικά και υλικά, τον αγαπούσαν και τον σέβονταν. Πολλοί μάλιστα τον ευλαβούνταν από τον καιρό που ήταν εν ζωή, αφού από πολύ νωρίς απέκτησε τη φήμη ενός εξαιρετικού ιερομονάχου και πνευματικού.", "Η ζωή του ήταν απλή και ταπεινή – σύμφωνη, όσο ήταν δυνατόν, με το αυστηρό μοναχικό τυπικό που ως παρακαταθήκη παρέλαβε από τους πρώτους πνευματικούς του πατέρες στο Σταυροβούνι. Ο ίδιος ήταν πολύ αυστηρός νηστευτής –συνήθως έτρωγε ελάχιστα και χωρίς να έχει απαιτήσεις για το είδος του φαγητού. Το ίδιο αυστηρός ήταν και στο θέμα της προσευχής και της τέλεσης των ακολουθιών (Στις ακολουθίες ήθελε το τυπικό και η εκκλησιαστική τάξη να τηρείται με πολλή ακρίβεια).", "Αγαπούσε τη μελέτη –γι’ αυτό και ήταν καλά καταρτισμένος θεολογικά- και του άρεσε να διηγείται κομμάτια από τα βιβλία που διάβαζε στους προσκυνητές που τον επισκέπτονταν. Πολλές φορές του είχαν προτείνει να φύγει από τα Ιεροσόλυμα για να σπουδάσει και επιστρέφοντας να ανεβεί σε μια ψηλότερη εκκλησιαστική τάξη. Ο Άγιος όμως πάντοτε αρνιόταν, αφού η μόνη του φιλοδοξία ήταν να αντιπροσωπεύει καλά το Μοναστήρι στα ηγουμενεία που διοριζόταν, όντας ένας σωστός μοναχός.", "Το τελευταίο προσκύνημα στο οποίο διορίστηκε ήταν στο Φρέαρ του Ιακώβ. Εκεί είχε να αντιμετωπίσει πολλές δυσκολίες γιατί συχνά τον επισκέπτονταν φανατικοί Σιωνιστές απαιτώντας να αφαιρέσει τις εικόνες και το Σταυρό από το ναό. Πολλές φορές μάλιστα τον απειλούσαν ότι θα τον σκότωναν αν δεν έφευγε από το προσκύνημα, αλλά αυτός είχε πάρει την απόφαση να παραμείνει εκεί ό,τι και αν συνέβαινε.", "Το απόγευμα της 29ης Νοεμβρίου του 1979, μέρα που η εκκλησία μας τιμά τη μνήμη του Αγίου μάρτυρος Φιλουμένου  «άγνωστοι» εισήλθαν στο Φρέαρ του Ιακώβ και επιτέθηκαν στον Άγιο. Τον σκότωσαν κτυπώντας τον με τσεκούρι στο πρόσωπο, στα χέρια και στα πόδια. Στη συνέχεια βεβήλωσαν την εκκλησία, ενώ φεύγοντας έριξαν  και μια χειροβομβίδα καταστρέφοντας το χώρο σχεδόν ολοσχερώς.", "Το σκήνωμα του Αγίου μεταφέρθηκε για νεκροψία στο Τελ Αβίβ και παρόλο που οι αρχές το έδωσαν στους πατέρες του Πατριαρχείου μετά από 5 μέρες, δεν παρουσίαζε νεκρική ακαμψία αλλά ήταν μαλακό και ευλύγιστο σαν να ήταν εν ζωή.", "Η κηδεία έγινε στο ναό της Αγίας Θέκλας (στις 4 Δεκεμβρίου του 1979), παρόντων των Αγιοταφιτών πατέρων, συγγενών του Αγίου και πλήθους κόσμου, όχι μόνο ορθοδόξων αλλά και ετεροδόξων και μουσουλμάνων. Λίγο αργότερα έγινε και η ταφή του μάρτυρος στο κοιμητήριο της Αγιοταφικής αδελφότητας στην Αγία Σιών.", "Τέσσερα περίπου χρόνια μετά το θάνατο του Αγίου Φιλουμένου, στις 30 Νοεμβρίου του 1983, πάρθηκε η απόφαση από το Πατριαρχείο να γίνει η ανακομιδή των οστών του. Όσοι ήταν παρόντες όμως βρέθηκαν μπροστά σε ένα θαυμαστό γεγονός: όταν ανοίχτηκε ο τάφος το σώμα του μάρτυρος ήταν άφθορο και ευωδιάζων, ως άνωθεν επισφράγιση της ένταξής του «εν σκηναίς Αγίων».", "Στη συνέχεια ξανακλείστηκε ο τάφος και άνοιξε ξανά στις 26 Δεκεμβρίου του 1984. Το σκήνωμά του Αγίου βρέθηκε και πάλι να ευωδιάζει και να διατηρεί μερική αφθαρσία. Τότε, οι Αγιοταφίτες το τοποθέτησαν στο Ιερό Βήμα του ναού της Αγίας Σιών. Στις μέρες μας έχει ολοκληρωθεί στον τόπο μαρτυρίου του Αγίου περικαλλής τρίκλιτος ναός, του οποίου το ένα κλίτος  είναι αφιερωμένο στον Άγιο Φιλούμενο. Εκεί μεταφέρθηκε το 2008 και το σκήνωμά του. Σ’ αυτό προστρέχουν και πολλοί που ευλαβούνται τον Άγιο –όχι μόνο ορθόδοξοι αλλά και άραβες ακόμη και ετερόδοξοι- ζητώντας τις προς τον Κύριο πρεσβείες του.  Στις  29 Νοεμβρίου του 2009 έχει γίνει από τη Σύνοδο του Πατριαρχείου Ιεροσολύμων η επίσημη Αγιοκατάταξη του Αγίου.", "Απολυτίκιο", "Ἦχος α΄. Τῆς ἐρήμου πολίτης.", "Τῆς Ὀρούντης τὸν γόνον, νήσου Κύπρου τὸ βλάστημα, καὶ   ἱερομάρτυρα νέον Ἰακὼβ θείου Φρέατος, Φιλούμενον, τιμήσωμεν, πιστοί, ὡς πρόμαχον τῆς πίστεως ἡμῶν, καὶ ἀήττητον ὁπλίτην Χριστοῦ τῆς ἀληθείας πόθῳ κράζοντες· Δόξα τῷ σὲ δοξάσαντι Χριστῷ, δόξα τῷ σὲ ἀφθαρτίσαντι, δόξα τῷ σὲ ἡμῖν χειραγωγὸν πρὸς πόλον δείξαντι."]}, {"n": 5, "title": "Άγιος Δημήτριος Γκαγκαστάθης", "paras": ["Ο ενάρετος ιερέας π. Δημήτριος (Γκαγκαστάθης) γεννήθηκε στο χωριό Πλάτανος Τρικάλων την 1η Αυγούστου 1903 από φτωχούς γονείς. Από μικρό παιδί ξεχώριζε για τη βαθιά του ευλάβεια. Βοηθούσε τον ιερέα στις ιερές ακολουθίες και, όταν έπαιζε, μιμούνταν όσα έβλεπε να κάνει ο ιερέας κατά τη Θεία Λατρεία. Αγαπούσε ιδιαίτερα να διαβάζει τους βίους των Αγίων και, καθώς έβοσκε τα πρόβατα, ζωγράφιζε απλές εικόνες τους.", "Κατά τη Μικρασιατική Εκστρατεία επιστρατεύθηκε και πολλές φορές σώθηκε από βέβαιο θάνατο χάρη στη θαυματουργική επέμβαση των αγαπημένων του Αγίων Ταξιαρχών. Επέστρεψε σώος στο χωριό του στις 18 Ιουνίου 1924. Το 1928 παντρεύτηκε την ευλαβή συγχωριανή του Ελισάβετ και απέκτησαν εννέα κόρες. Η μικρότερη ακολούθησε τον μοναχικό βίο και έγινε ηγουμένη με το όνομα Ισιδώρα.", "Ο Μητροπολίτης Τρίκκης Πολύκαρπος τον χειροθέτησε αναγνώστη και στις 24 Μαΐου 1931 τον χειροτόνησε διάκονο. Δύο ημέρες αργότερα τον χειροτόνησε πρεσβύτερο. Σπούδασε στην Ιερατική Σχολή Τριπόλεως και υπηρέτησε ως εφημέριος για σαράντα δύο χρόνια στον Ιερό Ναό Αγίου Νικολάου του χωριού του. Παράλληλα φρόντιζε και τα γύρω παρεκκλήσια, ιδιαίτερα εκείνο των προστάτων του, των Αγίων Ταξιαρχών, όπου περνούσε πολλές νύχτες αγρυπνώντας και προσευχόμενος.", "Όλη του η ζωή ήταν αφιερωμένη στην αδιάλειπτη προσευχή, στη μυστική ελεημοσύνη και στα προσκυνήματα, ιδιαίτερα στις Ιερές Μονές των Μετεώρων. Εκεί εξομολογούνταν στον Γέροντα Αιμιλιανό και τελούσε μεταμεσονύκτιες Θείες Λειτουργίες, επειδή δεν μπορούσε να επισκέπτεται συχνά τον βασικό πνευματικό του πατέρα, τον όσιο Γέροντα Φιλόθεο Ζερβάκο στην Πάρο. Όπως έλεγε, είχε ανάγκη να βρίσκεται κοντά στον πνευματικό του.", "Με μεγάλη συγκίνηση διηγούνταν τη συμμετοχή του στους εορτασμούς της Χιλιετηρίδας του Αγίου Όρους, όπου γνώρισε μεγάλους ασκητές, όπως τον Όσιο Αβιμέλεχ τον Μικραγιαννανίτη, τον Γέροντα Γερόντιο τον Δανιηλαίο με τη συνοδεία του και τον Όσιο Εφραίμ τον Κατουνακιώτη. Ο τελευταίος εντυπωσιάστηκε ιδιαίτερα από την πνευματική του κατάσταση και ανέπτυξαν μεταξύ τους σημαντική αλληλογραφία.", "Από τους Αγίους της Εκκλησίας αγαπούσε ιδιαίτερα τους Αγίους Ταξιάρχες, αλλά και τον Άγιο Νικόλαο, τον Άγιο Σπυρίδωνα, τον Άγιο Δημήτριο και τον Άγιο Νεκτάριο.", "Ξεχωριστή ήταν η σχέση του με τον θαυματουργό προστάτη των Τρικάλων, τον Άγιο Βησσαρίωνα, Μητροπολίτη Λαρίσης. Με έκσταση διηγούνταν ότι τον είδε να παρίσταται σωματικά σε Θεία Λειτουργία που τέλεσε μαζί με τον Γέροντα Αιμιλιανό στην Ιερά Μονή Δουσίκου.", "Διατηρούσε επίσης στενές πνευματικές σχέσεις με τον Όσιο Ιουστίνο Πόποβιτς και με πνευματικά του τέκνα, όπως τον Όσιο Αμφιλόχιο της Πάτμου, τον Αρχιμανδρίτη Αθανάσιο Χαμακιώτη και ιδιαίτερα τον μακαριστό Μητροπολίτη Τρίκκης και Σταγών Διονύσιο, ο οποίος τον αγαπούσε πολύ και τον θεωρούσε καύχημα της Μητροπόλεως και πρότυπο ποιμένα, αντάξιο των παλαιών χαριτωμένων ιερέων.", "Κατά τη διάρκεια της ιερατικής του διακονίας έζησε πολλά θαυμαστά γεγονότα, υπερφυσικές αποκαλύψεις και θεραπείες ασθενών. Παράλληλα υπέστη σκληρούς διωγμούς κατά την περίοδο της Κατοχής και του Εμφυλίου Πολέμου (1941–1948), από τους οποίους σώθηκε με τη χάρη του Θεού και την επέμβαση των Αγίων.", "Με ακλόνητη πίστη ζητούσε τη θαυματουργική επέμβαση του Θεού μέσω των Αγίων, λέγοντας χαρακτηριστικά: «Τώρα θέλω θαύμα». Και, σύμφωνα με τις μαρτυρίες όσων τον γνώρισαν, ο Κύριος απαντούσε στις προσευχές του ταπεινού αυτού λειτουργού, ο οποίος υπηρετούσε το Άγιο Θυσιαστήριο με φόβο Θεού και βαθιά ευλάβεια. Πολλοί μαρτυρούσαν ότι κατά τη Θεία Λειτουργία αναδυόταν από το Ιερό Βήμα μια θαυμαστή ευωδία.", "Ο ίδιος υπέγραφε συνήθως τις επιστολές του ως «ο πάντων έσχατος και αμαρτωλός παπαδάκος, μάλλον το σκύβαλο της γης». Έστελνε επιστολές σε πλήθος ανθρώπων που ζητούσαν τις προσευχές του και μνημόνευε αδιάκοπα τα ονόματά τους τόσο στην Αγία Πρόθεση όσο και στις προσωπικές του αγρυπνίες στο παρεκκλήσι των Αγίων Ταξιαρχών.", "Τα τελευταία τρία χρόνια της ζωής του δοκιμάστηκε από τον καρκίνο, μια εξαιρετικά επώδυνη ασθένεια, την οποία υπέμεινε χωρίς να παραπονιέται, δοξάζοντας τον Θεό, όπως ο δίκαιος Ιώβ. Μέχρι την τελευταία ημέρα δεχόταν στο σπίτι του τους πολυάριθμους επισκέπτες που ζητούσαν την ευχή του. Δίπλα του στεκόταν πάντοτε η πιστή του σύζυγος και εκλεκτή πρεσβυτέρα, η οποία τον βοηθούσε στη μνημόνευση των αμέτρητων ονομάτων, επαναλαμβάνοντας αδιάκοπα το «Κύριε, ελέησον».", "Ο π. Δημήτριος κοιμήθηκε στις 29 Ιανουαρίου 1975. Η πάνδημη εξόδιος ακολουθία τελέστηκε την επομένη, 30 Ιανουαρίου, στον Ιερό Ναό Αγίου Νικολάου Πλατάνου, προεξάρχοντος του τότε Μητροπολίτη Τρίκκης και Σταγών Στεφάνου, με τη συμμετοχή δεκάδων ιερέων και πλήθους πιστών.", "Ήδη όσο ζούσε, οι άνθρωποι τον θεωρούσαν Άγιο του Θεού και ζωντανό παράδειγμα του Ευαγγελίου. Η πίστη αυτή επιβεβαιώθηκε όταν η Αγία και Ιερά Σύνοδος του Οικουμενικού Πατριαρχείου, υπό την προεδρία της Α.Θ. Παναγιότητος του Οικουμενικού Πατριάρχη κ.κ. Βαρθολομαίου, αποφάσισε στις 9 Ιουλίου 2025 την αγιοκατάταξή του και όρισε η μνήμη του να τιμάται κάθε χρόνο στις 29 Ιανουαρίου, ημέρα της οσιακής κοιμήσεώς του.", "Ἀπολυτίκιον\nἮχος δ΄. Ταχύ προκατάλαβε.\nὩς σκεῦος σε χάριτος, καὶ λειτουργὸν ἱερόν, καὶ καύχημα ἔνθεον τῆς Τρίκκης, ὕμνοις λαμπρῶς τιμῶμεν, Δημήτριε· σὺ γὰρ ἐκ τοῦ Πλατάνου, ὡς ἀστήρ, θεοφόρε, ἔλαμψας ἀρετῶν σου λαμπηδὸσι· διόπερ, ἡμᾶς τοὺς σὲ ὑμνοῦντας πιστῶς, πρεσβείαις σου φώτισον."]}, {"n": 6, "title": "Άγιος Ευμένιος Σαριδάκης", "paras": ["Ο χαμογελαστός άγιος", "Ο Άγιος Ευμένιος Σαριδάκης γεννήθηκε την 1η Ιανουαρίου 1931 στην Εθιά Ηρακλείου Κρήτης. Το βαπτιστικό του όνομα ήταν Κωνσταντίνος. Ήταν το όγδοο παιδί μιας φτωχής αλλά ευσεβούς οικογένειας. Οι γονείς του, Γεώργιος και Σοφία, μεγάλωσαν τα παιδιά τους με πίστη στον Θεό και αγάπη προς την Εκκλησία. Ο μικρός Κωνσταντίνος έχασε τον πατέρα του σε ηλικία μόλις δύο ετών, και η οικογένεια βρέθηκε σε ακόμη μεγαλύτερη φτώχεια. Η μητέρα του εργαζόταν σκληρά για να θρέψει τα παιδιά της, ενώ αργότερα η γερμανική Κατοχή έκανε τη ζωή τους ακόμη δυσκολότερη.", "Παρά τις στερήσεις, την πείνα και την ανέχεια, ο Κωνσταντίνος ξεχώριζε από μικρός για την καλοσύνη, την ευλάβεια και την αγάπη του. Παπούτσια φόρεσε για πρώτη φορά στα δώδεκά του χρόνια, όμως ποτέ δεν παραπονέθηκε. Βοηθούσε στον ναό του χωριού και, όταν ο ιερέας ήθελε να του δώσει χρήματα, εκείνος αρνιόταν λέγοντας: «Δεν παίρνουμε ποτέ χρήματα από την Εκκλησία». Ακόμη και το λίγο ψωμί που του έδιναν, το μοιραζόταν με τα αδέλφια του.", "Από πολύ μικρός φανέρωσε ιδιαίτερη χάρη. Αγαπούσε την προσευχή, την Εκκλησία και τη νηστεία. Δεν γνώρισε σχεδόν καθόλου γράμματα, λόγω των δυσκολιών της εποχής, αλλά είχε μεγάλη εξυπνάδα και δυνατή μνήμη. Μπορούσε να κάνει δύσκολους λογαριασμούς από μνήμης, γι’ αυτό οι συγχωριανοί του συχνά τον φώναζαν να τους βοηθήσει.", "Η κλήση του στον μοναχισμό ήρθε με θαυμαστό τρόπο. Όπως ο ίδιος διηγήθηκε, την Πρωτοχρονιά του 1944, ενώ βρισκόταν στο σπίτι του, είδε μια δυνατή λάμψη που μπήκε στα βάθη της ψυχής του. Εκείνη τη στιγμή φώναξε στην αδελφή του Ευγενία: «Θα γίνω καλόγερος». Από τότε η απόφασή του ήταν σταθερή.", "Σε ηλικία δεκαεπτά ετών πήγε στην Ιερά Μονή Αγίου Νικήτα, στη νότια Κρήτη. Εκεί έγινε δεκτός από τον ηγούμενο πατέρα Ιερόθεο και άρχισε τη δοκιμασία του. Στη Μονή φρόντιζε δύο ηλικιωμένους και τυφλούς μοναχούς, έκανε όλα τα διακονήματα με προθυμία και έδειχνε μεγάλη αγάπη και υπακοή. Μετά από τρία χρόνια εκάρη μοναχός και πήρε το όνομα Σωφρόνιος. Η ζωή του ήταν ζωή ταπεινώσεως, κόπου, αγρυπνίας και προσευχής.", "Αργότερα κλήθηκε να υπηρετήσει στον στρατό, καθώς τότε οι μοναχοί δεν απαλλάσσονταν από τη στρατιωτική θητεία. Και εκεί διακρίθηκε για την υπακοή, την εργατικότητα και το ήθος του. Κρατούσε όλες τις νηστείες της Εκκλησίας, ακόμη και μέσα στις δυσκολίες του στρατού.", "Κατά τη διάρκεια της θητείας του αρρώστησε βαριά. Οι γιατροί αρχικά δεν μπορούσαν να βρουν την αιτία. Τελικά διαπιστώθηκε ότι έπασχε από τη νόσο του Χάνσεν, δηλαδή λέπρα, και μεταφέρθηκε στον Αντιλεπρικό Σταθμό Αθηνών, στην Αγία Βαρβάρα. Όταν έμαθε την ασθένειά του, δεν απελπίστηκε. Αντίθετα, ευχαρίστησε τον Θεό, λέγοντας ότι ο μεγάλος σταυρός φέρνει και μεγάλη ανάσταση.", "Στον Αντιλεπρικό Σταθμό θεραπεύτηκε πλήρως, χωρίς να του μείνει κάποια παραμόρφωση ή σημάδι. Παρ’ όλα αυτά, δεν έφυγε. Παρέμεινε εκεί από αγάπη για τους ασθενείς αδελφούς του. Έζησε σε ένα μικρό κελί δίπλα στο εκκλησάκι των Αγίων Αναργύρων και αφιέρωσε τη ζωή του στη διακονία των αρρώστων, στην προσευχή και στη φροντίδα του ναού.", "Εκεί γνώρισε και υπηρέτησε με μεγάλη αγάπη τον Όσιο Νικηφόρο τον Λεπρό, ο οποίος έγινε πνευματικός του πατέρας και οδηγός. Ο πατήρ Σωφρόνιος τον φρόντιζε με όλη του την ψυχή, βλέποντας στο πρόσωπό του έναν άνθρωπο του Θεού.", "Το 1975, σε ηλικία σαραντατεσσάρων ετών, χειροτονήθηκε πρεσβύτερος και πήρε το όνομα Ευμένιος. Ως ιερέας συνέχισε να υπηρετεί στον χώρο του Λοιμωδών Νοσημάτων και αναδείχθηκε άριστος πνευματικός πατέρας. Πολλοί άνθρωποι έβρισκαν κοντά του παρηγοριά, καθοδήγηση και ειρήνη. Η ζωή του ήταν γεμάτη αγάπη, ταπείνωση, προσευχή και θυσία.", "Τα τελευταία χρόνια της ζωής του αντιμετώπισε σοβαρά προβλήματα υγείας: σάκχαρο, νεφρική ανεπάρκεια, προβλήματα στην όραση και στα πόδια. Παρ’ όλα αυτά συνέχισε όσο μπορούσε τα ιερατικά του καθήκοντα, τις ακολουθίες, τους αγιασμούς, τα ευχέλαια και την πνευματική στήριξη των ανθρώπων.", "Ο Άγιος Ευμένιος κοιμήθηκε στις 23 Μαΐου 1999, ημέρα Κυριακή, στο νοσοκομείο Ευαγγελισμός, σε ηλικία εξήντα οκτώ ετών. Η εξόδιος ακολουθία του τελέστηκε στον Ιερό Ναό των Αγίων Αναργύρων, τον οποίο είχε υπηρετήσει με τόση αυταπάρνηση. Ενταφιάστηκε την επόμενη ημέρα στην ιδιαίτερη πατρίδα του, την Εθιά Ηρακλείου.", "Η ζωή του Αγίου Ευμενίου υπήρξε ζωή σταυρού, υπομονής και αγάπης. Από τη φτώχεια και την ασθένεια δεν οδηγήθηκε στην πικρία, αλλά στην αγιότητα. Έγινε παρηγοριά για τους πονεμένους, στήριγμα για τους ασθενείς και ζωντανή μαρτυρία ότι ο άνθρωπος που εμπιστεύεται τον Θεό μπορεί να μετατρέψει κάθε δοκιμασία σε δρόμο σωτηρίας.", "Απολυτίκιο", "Ήχος Α Του Λίθου σφραγισθεντος", "Νήσου Κρήτης τον γόνον, Αθηναίων το καύχημα\nΤων λεπρών υπηρέτην, Λειτουργόν μέγαν άριστον\nΕυμένιον τιμήσωμεν πιστοί, Νικηφόρου θείου μαθητήν\nΤον παρέχοντα ιάσεις παντοδαπάς, Τοις ευλαβώς κραυγάζουσιν\nΔόξα τω δεδωκότι σοι ισχύν, Δόξα τω σε στεφανώσαντι\nΔόξα τω εν εσχάτοις τοις καιροίς σε αγιάσαντι"]}, {"n": 7, "title": "Άγιος Τύχων ο Αγιορείτης", "paras": ["Ο μοναχός που έλεγε πάντα «Δόξα σοι ο Θεός»", "Ο Άγιος Τύχων ο Αγιορείτης γεννήθηκε το 1884 στη Νόβια Μιχαλόβσκα της Ρωσίας. Οι γονείς του, Παύλος και Ελένη, ήταν άνθρωποι βαθιάς πίστης και ανέθρεψαν τον γιο τους, τον Τιμόθεο κατά κόσμον, με αγάπη προς τον Θεό και την Εκκλησία. Από μικρός έδειχνε ιδιαίτερο ζήλο για την πνευματική ζωή. Οι γονείς του, θέλοντας να βεβαιωθούν ότι η επιθυμία του να γίνει μοναχός ήταν ώριμη και σταθερή, του επέτρεψαν να επισκέπτεται μοναστήρια από τα δεκαεπτά έως τα είκοσί του χρόνια. Έτσι γεννήθηκε μέσα του η οριστική απόφαση να αφιερωθεί ολοκληρωτικά στον Χριστό.", "Κατά την περιήγησή του σε διάφορες μονές της Ρωσίας, βίωσε ένα θαυμαστό γεγονός που σημάδεψε όλη του τη ζωή. Κάποτε, εξαντλημένος από την πείνα, δεν μπορούσε να φάει το σκληρό ψωμί που υπήρχε. Προσευχήθηκε με απλότητα στην Παναγία ζητώντας βοήθεια. Τότε εμφανίστηκε μπροστά του μια νέα γυναίκα με φωτεινό πρόσωπο, του έδωσε μια φρέσκια φραντζόλα λευκό ψωμί και εξαφανίστηκε. Χρόνια αργότερα, όταν αντίκρισε την εικόνα της Παναγίας του Κρεμλίνου, αναγνώρισε ότι εκείνη ήταν που τον είχε βοηθήσει θαυματουργικά. Από τότε ένιωθε διαρκώς τη μητρική προστασία της Θεοτόκου.", "Στη συνέχεια επισκέφθηκε το Όρος Σινά και αργότερα την Παλαιστίνη, όπου ασκήθηκε κοντά στον Ιορδάνη. Επειδή όμως οι συνθήκες δεν του επέτρεπαν την ησυχία που επιθυμούσε, αποφάσισε να μεταβεί στο Άγιον Όρος, το Περιβόλι της Παναγίας.", "Στον Άθωνα ενδύθηκε το μοναχικό σχήμα και αφιερώθηκε ολοκληρωτικά στην άσκηση, την προσευχή, τη νηστεία και την αγρυπνία. Μετά από χρόνια πνευματικών αγώνων χειροτονήθηκε ιερέας και έλαβε το όνομα Τύχων. Η ζωή του ήταν εξαιρετικά λιτή. Ζούσε με ελάχιστη τροφή, φτωχά ρούχα και ελάχιστη ανάπαυση, ενώ περνούσε αμέτρητες ώρες στην προσευχή, προσευχόμενος με δάκρυα για ολόκληρο τον κόσμο.", "Τα πρώτα χρόνια έζησε στο κελί Μπουραζέρι. Αργότερα αποσύρθηκε στα Καρούλια, όπου έζησε δεκαπέντε χρόνια μέσα σε αυστηρότερη άσκηση και απομόνωση. Στη συνέχεια εγκαταστάθηκε στην Καψάλα, σε κελί της Ιεράς Μονής Σταυρονικήτα. Εκεί υπηρέτησε με πολλή αγάπη έναν ηλικιωμένο μοναχό μέχρι την κοίμησή του και συνέχισε μόνος τον ασκητικό του αγώνα.", "Η αγιότητα της ζωής του άρχισε να γίνεται γνωστή και πλήθος ανθρώπων κατέφευγαν κοντά του για παρηγοριά και πνευματική καθοδήγηση. Δέχθηκε να χειροτονηθεί ώστε να μπορεί να εξομολογεί τους πιστούς. Ο ίδιος όμως παρέμενε πάντοτε ταπεινός, αποδίδοντας κάθε καλό αποκλειστικά στον Θεό. Η αγαπημένη του φράση ήταν: «Δόξα σοι ο Θεός». Ζούσε διαρκώς μέσα στη δοξολογία του Θεού και συμμετείχε με όλη του την ύπαρξη στη Θεία Λειτουργία.", "Ο χαρακτήρας του ξεχώριζε για την παιδική απλότητα, την αθωότητα και την απόλυτη έλλειψη δόλου. Δεν χρειαζόταν πολλά λόγια για να διδάξει· η ίδια η παρουσία του γέμιζε τις ψυχές ειρήνη και γαλήνη. Όσοι τον συναντούσαν ένιωθαν ότι βρίσκονταν μπροστά σε έναν άνθρωπο που ζούσε ήδη από αυτή τη ζωή κοντά στον Θεό.", "Ιδιαίτερη θέση στη ζωή του κατέχει η σχέση του με τον Άγιο Παΐσιο. Ο νεαρός τότε μοναχός βρήκε στον παπα-Τύχωνα τον πνευματικό του πατέρα και οδηγό. Ο ίδιος ο Άγιος Παΐσιος ομολογούσε ότι πολλά από όσα έμαθε στην πνευματική ζωή τα οφείλει στον Γέροντά του. Ο παπα-Τύχων τον δίδαξε να προσεύχεται με απλότητα και καθαρή καρδιά, τονίζοντας ότι αυτό που ζητά ο Θεός δεν είναι τα μεγάλα κατορθώματα αλλά η ειλικρινής αγάπη και η ταπείνωση.", "Η αγάπη μεταξύ Γέροντα και υποτακτικού ήταν μοναδική. Λίγο πριν την κοίμησή του, ο παπα-Τύχων κράτησε για ώρες τα χέρια του πάνω στο κεφάλι του Παϊσίου, ευλογώντας τον και λέγοντάς του πως η αγάπη τους θα συνεχιστεί και μετά τον θάνατο, αφού εκείνος θα προσεύχεται από τον Ουρανό και ο Παΐσιος από τη γη.", "Λίγο πριν το τέλος της ζωής του, ο Άγιος αξιώθηκε να δει την Παναγία μαζί με δύο Αγίους, οι οποίοι του ανήγγειλαν ότι μετά τη γιορτή του Γενεσίου της Θεοτόκου θα τον παραλάμβανε η Κυρία Θεοτόκος. Πράγματι, λίγες ημέρες αργότερα κοιμήθηκε ειρηνικά.", "Τις τελευταίες ημέρες της ζωής του ο παπα-Τύχων προετοιμαζόταν με ιδιαίτερη επιμέλεια για τη συνάντησή του με τον Χριστό. Είχε ετοιμάσει επιστολές προς επισκόπους, ζητώντας να τον μνημονεύουν στη Θεία Λειτουργία μετά την κοίμησή του. Παρά τη μεγάλη σωματική αδυναμία, δεν εγκατέλειπε τις μετάνοιες. Επειδή δεν μπορούσε να σηκωθεί εύκολα, είχε δέσει ένα χοντρό σχοινί στο κελί του, με το οποίο στηριζόταν για να συνεχίσει τις μετάνοιές του. Έτσι αγωνίστηκε μέχρι τις τελευταίες του δυνάμεις.", "Μετά την κοίμησή του, ο Άγιος Παΐσιος αξιώθηκε να τον δει ζωντανό μέσα στο κελί του. Ο ίδιος περιγράφει ότι τον ασπάστηκε με συγκίνηση και αμέσως ο Γέροντας εξαφανίστηκε θαυμαστά μέσα στον ναό. Ο Άβθεώρθεώρησε αυτή την εμφάνιση ως ιδιαίτερη θεία παρηγοριά και επιβεβαίωση της αγιότητας του πνευματικού του πατέρα.", "Πολλοί εξομολογούμενοι μαρτυρούσαν τη βαθιά χάρη που είχε ο παπα-Τύχων. Ένας μοναχός διηγήθηκε ότι κατά την εξομολόγησή του ένιωσε τον αυχένα του να βρέχεται από τα δάκρυα του Γέροντα, ο οποίος έκλαιγε ασταμάτητα για τις αμαρτίες των πνευματικών του παιδιών. Η συμπόνια και η αγάπη του ήταν τόσο μεγάλες, ώστε βίωνε τον πόνο των άλλων ως δικό του.", "Ο Άγιος Παΐσιος συνήθιζε να λέει πως ο παπα-Τύχων ήταν πραγματικός άνθρωπος του Θεού και ότι δεν χρειαζόταν να μιλήσει· αρκούσε μόνο να βρίσκεται κανείς κοντά του για να αισθανθεί τη χάρη του Θεού. Μετά την κοίμησή του είπε χαρακτηριστικά: «Έφυγε ένας άγιος άνθρωπος. Τέτοιες ψυχές είναι τα στηρίγματα του κόσμου».", "Στις 11 Φεβρουαρίου 2026, η Αγία και Ιερά Σύνοδος του Οικουμενικού Πατριαρχείου αναγνώρισε επίσημα την αγιότητά του και τον κατέταξε στο Αγιολόγιο της Ορθόδοξης Εκκλησίας, ορίζοντας ως ημέρα μνήμης του την 23η Σεπτεμβρίου.", "Ο Άγιος Τύχων πέρασε περισσότερα από εξήντα χρόνια στο Άγιον Όρος, ζώντας με απόλυτη φτώχεια, ταπείνωση και αδιάλειπτη προσευχή. Με το παράδειγμά του δίδαξε ότι η πραγματική αγιότητα δεν βρίσκεται στα μεγάλα έργα, αλλά στην καθαρή καρδιά, στην ταπείνωση και στην ολοκληρωτική εμπιστοσύνη στον Θεό.", "Ἀπολυτίκιον\nἮχος α’. Τοῦ λίθου σφαγισθέντος\nΤῆς ἐρήμου πολίτης καὶ ἐν σώματι ἄγγελος, καὶ θαυματουργὸς ἀνεδείχθης, θεοφόρε Τύχων Πατὴρ ἡμῶν· νηστείᾳ ἀγρυπνίᾳ προσευχῇ, οὐράνια χαρίσματα λαβών, θεραπεύεις τοὺς νοσοῦντας, καὶ τὰς ψυχὰς τῶν πίστει προστρεχόντων σοι. Δόξα τῷ δεδωκότι σοι ἰσχύν, δόξα τῷ σὲ στεφανώσαντι, δόξα τῷ ἐνεργοῦντι διὰ σοῦ πᾶσιν ἰάματα."]}, {"n": 8, "title": "Άγιος Γεώργιος Χατζηγιώργης", "paras": ["Το παιδί που εμπιστεύτηκε την Παναγία", "Ο Άγιος Γεώργιος Χατζηγιώργης γεννήθηκε το 1809 στην Κερμίρα της Καππαδοκίας. Το κατά κόσμον όνομά του ήταν Γαβριήλ. Οι γονείς του, Ιορδάνης και Μαρία, ήταν ευσεβείς και πλούσιοι όχι μόνο σε αγαθά, αλλά και σε αρετές, σκορπίζοντας με αγάπη την περιουσία τους στους φτωχούς. Η μητέρα του είχε ιδιαίτερο ασκητικό πνεύμα και συχνά έπαιρνε τον μικρό Γαβριήλ σε αγρυπνίες, σπηλιές και εξωκλήσια. Από νωρίς η καρδιά του παιδιού άναψε από πόθο για τον μοναχισμό.", "Παρότι ήταν έξυπνος, ο Γαβριήλ δεν μπορούσε να μάθει γράμματα. Τέσσερα χρόνια παιδευόταν στο σχολείο χωρίς να καταφέρει ούτε να συλλαβίζει. Με συμβουλή της μητέρας του κατέφυγε με νηστεία, μετάνοιες και δάκρυα στην Παναγία, μπροστά στη θαυματουργή εικόνα της ενορίας τους. Τότε, κατά την παράδοση, άνοιξαν οι πόρτες του ναού και η Θεοτόκος τον οδήγησε στην εικόνα του Χριστού, παρακαλώντας Τον να του δώσει το χάρισμα της μάθησης. Από εκείνη τη στιγμή ο Γαβριήλ άρχισε να διαβάζει καθαρά, γεγονός που όλοι θεώρησαν θαύμα.", "Από παιδί αγαπούσε την άσκηση. Κατέφευγε στις σπηλιές, νήστευε, προσευχόταν και προσπαθούσε να μιμηθεί τους ασκητές. Σε ηλικία δεκατεσσάρων ετών ταξίδεψε με συγγενείς του στην Κωνσταντινούπολη, για να βοηθήσουν έναν θείο του που είχε αρνηθεί την πίστη του. Στον δρόμο χάθηκε μέσα στο δάσος, αλλά του παρουσιάστηκε ο Άγιος Γεώργιος ως φωτεινός αξιωματικός, τον ανέβασε στο άλογό του και τον οδήγησε ξανά στους συντρόφους του.", "Στην Κωνσταντινούπολη ο Γαβριήλ έμεινε τέσσερα χρόνια. Με προσευχή, νηστεία και μετάνοιες αγωνίστηκε για την επιστροφή του θείου του και άλλων στην πίστη. Πράγματι, εκείνοι έγιναν αρχικά κρυφοί χριστιανοί και αργότερα έφυγαν στη Σμύρνη, όπου έζησαν με μετάνοια.", "Σε ηλικία δεκαοκτώ ετών, μετά από υπόδειξη της Παναγίας, ο Γαβριήλ έφυγε για το Άγιον Όρος. Έφθασε πρώτα στη Μονή Γρηγορίου και κατόπιν πήγε στα Καυσοκαλύβια, κοντά στον παπα-Νεόφυτο τον Καραμανλή, μεγάλο ασκητή και συμπατριώτη του. Εκεί εκάρη μοναχός και πήρε το όνομα Γεώργιος.", "Αργότερα, μαζί με τη συνοδεία του παπα-Νεοφύτου, ανέβηκε στην Κερασιά, για περισσότερη ησυχία. Όταν ο παπα-Νεόφυτος αποσύρθηκε στις Καρυές, άφησε τον πατέρα Γεώργιο ως Γέροντα της συνοδείας. Ο Χατζηγιώργης, όπως έγινε γνωστός, καθοδηγούσε τους μοναχούς με πατρική διάκριση, όχι με φόβο αλλά με αγάπη. Έκοβε το θέλημα με τρόπο θεραπευτικό, κλαδεύοντας τον εγωισμό χωρίς να πληγώνει άσκοπα τις ψυχές.", "Η συνοδεία του ζούσε με αυστηρό ασκητικό τυπικό. Η τροφή τους ήταν κυρίως ξηροί καρποί και μέλι, χωρίς λάδι και αρτύσιμα. Ακόμη και το Πάσχα, αντί για αυγά, έβαφαν κόκκινες πατάτες. Η χαρά τους δεν βρισκόταν στα φαγητά, αλλά στη Θεία Χάρη, στην προσευχή και στη συχνή Θεία Κοινωνία. Ο Χατζηγιώργης δίδασκε ότι το καλύτερο φάρμακο είναι η εξομολόγηση και η συχνή μετάληψη των Αχράντων Μυστηρίων.", "Ο Άγιος είχε μεγάλη αγάπη για όλους, ιδιαίτερα για τους νέους και αδύναμους μοναχούς. Δεχόταν κοντά του μικρά παιδιά που δεν τα έπαιρναν άλλες μονές και τα προστάτευε σαν στοργικός πατέρας και μητέρα. Παράλληλα φρόντιζε και ηλικιωμένους μοναχούς σε γύρω κελιά, ώστε να ζουν αμέριμνα και να προσεύχονται για τη σωτηρία όλου του κόσμου.", "Το πρόσωπό του ακτινοβολούσε ειρήνη και χάρη. Οι άνθρωποι άνοιγαν εύκολα την καρδιά τους κοντά του και έβρισκαν παρηγοριά. Οι προσευχές του θεράπευαν ψυχές και σώματα. Πολλοί Ρώσοι προσκυνητές έπαιρναν φωτογραφίες του στη Ρωσία, τις έβαζαν στα εικονοστάσια και ασθενείς θεραπεύονταν με πίστη.", "Όμως η φήμη και η αγιότητά του προκάλεσαν φθόνο. Κάποιοι τον συκοφάντησαν ότι δήθεν υπηρετούσε ρωσικά συμφέροντα, επειδή είχε πνευματική σχέση με πολλούς Ρώσους μοναχούς και προσκυνητές. Σε μια εποχή εντάσεων ανάμεσα σε Έλληνες και Ρώσους στο Άγιον Όρος, οι συκοφαντίες βρήκαν πρόσφορο έδαφος. Ο ίδιος προσπάθησε να συμφιλιώσει τις πλευρές στη Μονή Αγίου Παντελεήμονος, έχοντας δει σε όραμα την Παναγία να μοιράζει ευλογίες εξίσου σε Έλληνες και Ρώσους. Παρά ταύτα, οι διχόνοιες συνεχίστηκαν.", "Τελικά η συνοδεία του διαλύθηκε και ο ίδιος διώχθηκε από τόπο σε τόπο. Από την Κερασιά πήγε στη Μονή Γρηγορίου, έπειτα φιλοξενήθηκε σε υποτακτικό του και αργότερα εγκαταστάθηκε σε ρωσικό κελί του Αγίου Στεφάνου στην Καψάλα. Οι συκοφαντίες όμως συνεχίστηκαν, ώσπου η Ιερά Κοινότητα αποφάσισε την εξορία του από το Άγιον Όρος το 1882.", "Ο Χατζηγιώργης βρέθηκε στον Μαρμαρά, κοντά στην Κωνσταντινούπολη, πληγωμένος από τον αποχωρισμό του από το Περιβόλι της Παναγίας και τα πνευματικά του παιδιά. Εκεί εγκαταστάθηκε σε ερημωμένο μοναστήρι των Αγίων Ερμολάου και Παντελεήμονος και συνέχισε την ασκητική ζωή του. Η παρουσία του έγινε βάλσαμο για τους χριστιανούς της Πόλης, που υπέφεραν εκείνη την εποχή. Παρηγορούσε, συμβούλευε και θεράπευε με τη χάρη του Θεού.", "Μέχρι το τέλος της ζωής του παρέμεινε φωτισμένος, ειρηνικός, ανεξίκακος και συγχωρητικός. Κοινώνησε τα Άχραντα Μυστήρια και εκοιμήθη στις 17 Δεκεμβρίου 1886. Ετάφη στο Μπαλουκλή, στον ναό της Ζωοδόχου Πηγής. Τρεις ημέρες μετά την κοίμησή του, σύμφωνα με αγιορείτικη μαρτυρία, παρέλαβε πνευματικά και τον παραδελφό του παπα-Νεόφυτο.", "Ο Άγιος Γεώργιος Χατζηγιώργης υπήρξε άνθρωπος άκακος, ταπεινός και γεμάτος αγάπη. Έζησε σαν άγγελος στη γη, χωρίς να κρατά πάθη ή υλικά πράγματα. Γι’ αυτό, όπως γράφει ο Άγιος Παΐσιος, αξιώθηκε στεφάνι Οσίου και Μάρτυρος, αφού υπέμεινε άδικους διωγμούς με αγάπη και συγχώρηση. Μετά την εκταφή των ιερών λειψάνων του, αναδύθηκε άρρητη ευωδία, επιβεβαιώνοντας την αγιότητα της ζωής του.", "Ἕτερον Ἀπολυτίκιον\nἮχος πλ. α ́. Τὸν Συνάναρχον Λόγον.\nΤὸν πανεύφημον ἄνδρα, τοῦ ὄρους Ἄθωνος, τὸν ἐπ' ἐσχάτων τῶν χρόνων, καθάπερ φάος λαμπρόν, τὴν σκοτίαν τῶν πιστῶν διασκεδάσαντα, καὶ νοσήματα ψυχῶν, καὶ σαρκὸς ἐπιφοράς, ἰώμενον ὑπὲρ φύσιν, τῆς προοράσεως λύχνον, Γεώργιον Χατζηγιώργη  τιμήσωμεν ."]}, {"n": 9, "title": "Άγιος Καλλίνικος Εδέσσης", "paras": ["Ο επίσκοπος που αγαπούσε όλους τους ανθρώπους", "Ο Άγιος Καλλίνικος, κατά κόσμον Δημήτριος Πούλος, γεννήθηκε το 1919 στα Σιταράλωνα Θέρμου Αιτωλοακαρνανίας.", "Από μικρός μεγάλωσε μέσα σε βαθιά εκκλησιαστική ατμόσφαιρα. Ο παππούς του Αθανάσιος, ευλαβής ιερέας με αγιορείτικο φρόνημα, τον μύησε στη λατρεία, στις ακολουθίες, στις νηστείες και στις μετάνοιες. Η γιαγιά του Σπυριδούλα του μετέδωσε την αγάπη προς την Παναγία την Προυσιώτισσα, ενώ οι γονείς του, Γεώργιος και Αικατερίνη, του δίδαξαν την πίστη, την αγάπη, την προσφορά και την απλότητα.", "Ως μαθητής στο Θέρμο διακρίθηκε για το ήθος και την ευλάβειά του. Αργότερα, ως φοιτητής της Θεολογικής Σχολής Αθηνών, δεν αρκέστηκε στην ακαδημαϊκή γνώση, αλλά αναζητούσε την έμπρακτη πνευματική ζωή. Στα δύσκολα χρόνια της Κατοχής διάβαζε το Ευαγγέλιο, προσευχόταν και αναζητούσε ασκητές, για να διδαχθεί από την εμπειρία τους. Όσοι τον γνώρισαν τότε τον περιέγραφαν ως άνθρωπο ασκητικό, άκακο, προσευχητικό και απόλυτα αφιερωμένο στον Χριστό.", "Κατά τη στρατιωτική του θητεία στα ΛΟΚ έδειξε ηρωικό φρόνημα, αλλά κυρίως ιεραποστολικό ζήλο. Κήρυττε μέσα και έξω από το στρατόπεδο, παρηγορούσε τους συστρατιώτες του και τους ενίσχυε στην πίστη. Οι γύρω του τον θαύμαζαν για τη ζεστασιά του λόγου του, την απλότητα, την ανδρεία και το φιλότιμό του.", "Το 1957 εκάρη μοναχός και επέλεξε το όνομα Καλλίνικος, όχι από συνήθεια, αλλά γιατί ήθελε να μιμηθεί τους καλλινίκους Μάρτυρες και να έχει καλούς πνευματικούς αγώνες και νίκες. Ως ιερομόναχος και αργότερα ως Πρωτοσύγκελλος της Ιεράς Μητροπόλεως Αιτωλίας και Ακαρνανίας, εργάστηκε με αυταπάρνηση. Περιόδευε σε χωριά, λειτουργούσε, κήρυττε ακούραστα, διοργάνωνε λατρευτικές εκδηλώσεις και ανέδειξε άξιους κληρικούς. Παράλληλα ζούσε με αυστηρό ασκητικό πνεύμα. Στο μικρό του δωμάτιο στο Μεσολόγγι, που έμοιαζε με καλογερικό κελί, κοιμόταν λίγες ώρες σε στρατιωτικό ράντζο και προσευχόταν για τον λαό και τους κληρικούς.", "Αργότερα εξελέγη Μητροπολίτης Εδέσσης, Πέλλης και Αλμωπίας. Στον χειροτονητήριο λόγο του ζήτησε να γίνει μέσα του «πυρκαϊά αγάπης» για τον Χριστό και την Εκκλησία και να καεί σαν λαμπάδα για τη δόξα του Εσταυρωμένου. Στην ενθρόνισή του τόνισε ότι ο θρόνος του Επισκόπου δεν είναι τιμή, αλλά σταυρός και Γολγοθάς.", "Ως επίσκοπος υπήρξε απλός, λιτός, ασκητικός, ανεπιτήδευτος και γεμάτος αγάπη. Έθεσε στο κέντρο της διακονίας του τη Θεία Λειτουργία, την οποία ζούσε ως ουράνια μυσταγωγία. Δεν λειτουργούσε μηχανικά, αλλά προετοιμαζόταν με προσευχή, νηστεία και κατάνυξη. Το κήρυγμά του ήταν απλό, πατρικό, ευαγγελικό και γεμάτο χάρη. Οι άνθρωποι δεν ήθελαν να σταματήσει να μιλά, γιατί ο λόγος του έπεφτε στις καρδιές τους σαν ήρεμη βροχή.", "Ιδιαίτερη φροντίδα έδειχνε στην επιλογή και χειροτονία κληρικών. Προσευχόταν γι’ αυτούς με δάκρυα και τους παρακαλούσε να γίνουν αναμμένες λαμπάδες μπροστά στο θυσιαστήριο του Θεού. Δεχόταν καθημερινά ανθρώπους στο γραφείο του, επισκεπτόταν χωριά, σχολεία, στρατόπεδα, νοσοκομεία, γηροκομεία και σπίτια, πάντα με σεμνότητα, απλότητα και παρηγορητικό λόγο.", "Παρότι ήταν επίσκοπος, αισθανόταν κατά την καρδιά αγιορείτης. Επισκεπτόταν το Άγιον Όρος με δέος, σιωπή και δάκρυα. Οι αγιορείτες πατέρες τον θεωρούσαν ησυχαστή ιεράρχη. Τον ευλαβούνταν ο Άγιος Παΐσιος, ο π. Εφραίμ Κατουνακιώτης, ο π. Εφραίμ Φιλοθεΐτης, ο π. Γεώργιος Γρηγοριάτης και πολλοί άλλοι. Ο Άγιος Παΐσιος τον αποκαλούσε «Άγιο Επίσκοπο».", "Στα τελευταία χρόνια της ζωής του προσβλήθηκε από καρκίνο στον εγκέφαλο. Αντιμετώπισε την ασθένεια με απόλυτη εμπιστοσύνη στον Θεό. Έκανε γενική εξομολόγηση, την οποία χαρακτήρισε «μπάνιο» της ψυχής, και συνέταξε τη διαθήκη του, ζητώντας συγχώρεση από όλους και συγχωρώντας από καρδιάς όποιον τον είχε λυπήσει. Δεν φοβόταν τον θάνατο· τον έβλεπε ως μετάβαση προς τον Θεό. Έλεγε χαρακτηριστικά: «Δεν με ενδιαφέρει πολύ η αρρώστια. Ας ήμουν άγιος και ας ήμουν με ένα πόδι ή με ένα μάτι».", "Κατά την επτάμηνη ασθένειά του φανερώθηκε όλος ο κρυμμένος πνευματικός του πλούτος. Δοξολογούσε τον Θεό, ευχαριστούσε όσους τον υπηρετούσαν, ταπεινωνόταν βαθιά και προσευχόταν αδιάλειπτα. Αισθάνθηκε μάλιστα την επίσκεψη της Παναγίας της Προυσιώτισσας και το πρόσωπό του έλαμπε από ειρήνη. Εκοιμήθη οσιακά στις 8 Αυγούστου 1984, μέσα σε ατμόσφαιρα προσευχής, σαν αγιορείτικη αγρυπνία.", "Μετά την κοίμησή του, το μνήμα του έγινε τόπος προσευχής και παρηγοριάς. Πολλοί μαρτυρούν θαυμαστές επεμβάσεις του: θεραπείες, παρηγοριές, ενισχύσεις και εμφανίσεις σε ανθρώπους που τον επικαλέστηκαν. Η αγιότητά του αναγνωρίστηκε από τον λαό πολύ πριν την επίσημη αγιοκατάταξη.", "Το Οικουμενικό Πατριαρχείο τον κατέταξε στο Αγιολόγιο της Εκκλησίας στις 23 Ιουνίου 2020 και η μνήμη του τιμάται κάθε χρόνο στις 8 Αυγούστου, ημέρα της οσιακής κοιμήσεώς του.", "Ο Άγιος Καλλίνικος υπήρξε ζωντανή εικόνα ταπείνωσης, αγάπης, προσευχής και εκκλησιαστικού φρονήματος. Έζησε ως ασκητής επίσκοπος και κοιμήθηκε ως όσιος. Με τη ζωή του φανέρωσε ότι ο σκοπός κάθε ανθρώπου είναι η αγιότητα και ότι η επισκοπική διακονία, όταν βιώνεται ως σταυρός και θυσία, γίνεται δρόμος προς τη Βασιλεία του Θεού.", "Ἀπολυτίκιον Ἦχος α΄. Τῆς ἐρήμου πολίτης.", "Τῆς Ἐδέσσης ποιμένα, Ἀρχιθύτην πανεύφημον, καὶ τῆς Ἐκκλησίας ἁπάσης, τὸ λαμπρὸν σεμνολόγημα, Καλλίνικον τιμήσωμεν πιστοί, τοῦ κλήρου καὶ λαοῦ τὸν ποδηγόν, ὡς πρεσβεύοντα ἀπαύστως ὑπὲρ αὐτῶν, τῶν ἐκβοώντων πάντοτε. Δόξα τῷ σὲ δοξάσαντι Χριστῷ, δόξα τῷ σὲ ἀναδείξαντι, δόξα τῷ ἐνεργοῦντι διὰ σοῦ πᾶσιν ἰάματα."]}, {"n": 10, "title": "Άγιος Νικόλαος Πλανάς", "paras": ["Ο Άγιος παπα Νικόλας Πλανάς γεννήθηκε στη Νάξο το 1851. Οι γονείς του, Ιωάννης και Αυγουστίνα, ήταν εύποροι και ευσεβείς άνθρωποι, που του μετέδωσαν από μικρό παιδί την απλή και άδολη ορθόδοξη πίστη. Στο κτήμα της οικογένειας υπήρχε μικρό εκκλησάκι του Αγίου Νικολάου, το οποίο έγινε για τον μικρό Νικόλαο δεύτερο σπίτι. Εκεί έψελνε, προσευχόταν και, σαν παιδί, μιμούνταν τον ιερέα, φορώντας ένα σεντόνι σαν φελόνι.", "Από τον παππού του, Γεώργιο Μελισσουργός, ο οποίος ήταν Ιερέας έμαθε την αγάπη προς τη Θεία Λειτουργία, τον σεβασμό στο Ιερό Βήμα, την ακρίβεια στην τέλεση των Μυστηρίων, την ταπείνωση και την αγάπη προς όλους, ιδιαίτερα προς τους φτωχούς και πονεμένους.", "Σε ηλικία δεκατεσσάρων ετών έχασε τον πατέρα του. Η μητέρα του πήρε τον Νικόλαο και την αδελφή του και εγκαταστάθηκαν στην Αθήνα, στην περιοχή του Αγίου Παντελεήμονος Ιλισσού. Αν και είχε μερίδιο από την πατρική περιουσία, το έβαλε ενέχυρο για να βοηθήσει άλλον άνθρωπο και έτσι έμεινε φτωχός σε όλη του τη ζωή.", "Σε ηλικία δεκαεπτά ετών παντρεύτηκε την Ελένη Προβελέγγιου από τα Κύθηρα, ύστερα από επιθυμία της μητέρας του. Απέκτησαν έναν γιο, τον Ιωάννη, αλλά η σύζυγός του σύντομα αρρώστησε και πέθανε. Ο Νικόλαος είχε έντονο πόθο να υπηρετήσει την Εκκλησία. Στις 28 Ιουλίου 1879 χειροτονήθηκε διάκονος στον ναό της Μεταμορφώσεως του Σωτήρος στην Πλάκα και στις 2 Μαρτίου 1885 πρεσβύτερος στον Άγιο Παντελεήμονα Ιλισσού. Αργότερα υπηρέτησε στον Άγιο Ιωάννη Κυνηγό, στην οδό Βουλιαγμένης, σε μια περιοχή που τότε είχε λίγες οικογένειες βοσκών, αμπέλια και στάνες.", "Παράλληλα λειτουργούσε συχνά στο μικρό παρεκκλήσι του Αγίου Ελισσαίου στο Μοναστηράκι, όπου τελούσε κατανυκτικές ολονυχτίες. Εκεί έψαλλαν πολλές φορές ο Αλέξανδρος Παπαδιαμάντης και ο Αλέξανδρος Μωραϊτίδης. Ο Παπα-Νικόλας έγινε γρήγορα γνωστός για την ευλάβεια, την καλοσύνη, την ταπείνωση, την ανεξικακία και την απλότητά του. Οι Αθηναίοι τον αγαπούσαν και τον σέβονταν ως άνθρωπο του Θεού.", "Η μεγάλη του χαρά ήταν η Θεία Λειτουργία. Ζούσε κυριολεκτικά για να λειτουργεί. Όταν στεκόταν μπροστά στην Αγία Τράπεζα, φαινόταν σαν να μην βρισκόταν στη γη, αλλά στο ουράνιο θυσιαστήριο. Οι ακολουθίες του ήταν μακρές και κατανυκτικές. Συχνά στεκόταν όρθιος για πολλές ώρες, χωρίς να κουράζεται, προσευχόμενος για ζωντανούς και κεκοιμημένους. Στην Προσκομιδή μνημόνευε χιλιάδες ονόματα, τα οποία είχε γραμμένα σε μικρά χαρτάκια και τα κουβαλούσε πάντοτε μαζί του.", "Ήταν ολιγογράμματος και πολλές φορές έκανε λεκτικά λάθη στα αναγνώσματα. Όμως τις ευχές της Θείας Λειτουργίας τις ήξερε σωστά από μνήμης. Η σοφία του δεν ήταν κοσμική, αλλά καρπός της χάριτος του Θεού. Πολλοί άνθρωποι, μορφωμένοι και απλοί, έτρεχαν κοντά του για συμβουλή, παρηγοριά και εξομολόγηση.", "Ως πνευματικός πατέρας ήταν ήρεμος, πατρικός και επιεικής. Δεν αντιμετώπιζε την αμαρτία με θυμό ή σκληρότητα, αλλά ως πνευματική ασθένεια που χρειάζεται θεραπεία. Δεν αποθάρρυνε κανέναν, όσο βαριά κι αν ήταν τα σφάλματά του. Σύστηνε μετάνοια, ταπείνωση, προσευχή, συμμετοχή στα Μυστήρια και αγάπη. Έλεγε συχνά: «Να είστε αγαπημένοι, παιδιά μου» και «κάντε υπομονή και ο Θεός θα δώσει τη λύση».", "Η ζωή του ήταν ασκητική. Έτρωγε ελάχιστα, κυρίως χόρτα, νήστευε με ακρίβεια όλες τις νηστείες της Εκκλησίας και αγρυπνούσε συχνά. Ό,τι χρήματα του έδιναν οι πιστοί, τα μοίραζε στους φτωχούς. Στην τσέπη του δεν κρατούσε ποτέ τίποτε για τον εαυτό του. Βοηθούσε χήρες, ορφανά, φτωχές οικογένειες και νέους ανθρώπους που ξεκινούσαν τη ζωή τους. Έβλεπε σε κάθε πονεμένο άνθρωπο τον ίδιο τον Χριστό.", "Ο Θεός τον αξίωσε και με χαρίσματα. Υπάρχουν πολλές μαρτυρίες για θεραπείες, παρηγοριές, προφητικά λόγια και θαυμαστές επεμβάσεις με τις προσευχές του. Ο ίδιος ποτέ δεν καυχιόταν γι’ αυτά· τα αποκαλούσε «σημεία από τον Θεό». Πολλά παιδιά που διακονούσαν στο Ιερό έλεγαν ότι τον έβλεπαν την ώρα της Θείας Λειτουργίας να μην πατά στη γη, αλλά να στέκεται σαν πάνω σε σύννεφο.", "Ήταν άνθρωπος απίστευτης πραότητας. Δεν θύμωνε, δεν κακολογούσε, δεν κρατούσε κακία. Ακόμη και όσους τον αδικούσαν ή τον έκλεβαν, τους αντιμετώπιζε με καλοσύνη. Φορούσε φτωχά και τριμμένα ράσα, έμενε σε φτωχικό σπίτι και μιλούσε πάντοτε για την αναξιότητά του. Η απλότητά του δεν ήταν εξωτερική, αλλά φανέρωση της καθαρής και ενωμένης με τον Θεό καρδιάς του.", "Στις 28 Φεβρουαρίου 1932, Κυριακή του Ασώτου, τέλεσε για τελευταία φορά τη Θεία Λειτουργία. Πριν τελειώσει, ένιωσε αδιαθεσία και λιποθύμησε. Μεταφέρθηκε στο σπίτι του και στις 2 Μαρτίου 1932 παρέδωσε την ψυχή του στον Κύριο. Πριν κοιμηθεί, έκανε το σημείο του Σταυρού και είπε: «Τον δρόμον τετέλεκα» και «Δόξα σοι ο Θεός». Έπειτα ευλόγησε τους παρισταμένους λέγοντας: «Η Θεία Χάρη να σας ευλογεί».", "Η κοίμησή του γέμισε θλίψη την Αθήνα. Το τίμιο σκήνωμά του τέθηκε σε λαϊκό προσκύνημα στον Άγιο Ιωάννη Βουλιαγμένης και πλήθη πιστών προσήλθαν με δάκρυα για να πάρουν την ευχή του. Από την πρώτη στιγμή ο λαός τον θεωρούσε άγιο.", "Το 1992 το Οικουμενικό Πατριαρχείο τον κατέταξε επίσημα στο Αγιολόγιο της Εκκλησίας. Η μνήμη του εορτάζεται στις 2 Μαρτίου. Την ίδια χρονιά έγινε η εκταφή των ιερών λειψάνων του, τα οποία τοποθετήθηκαν σε αργυρή λάρνακα στον Ιερό Ναό Αγίου Ιωάννου Βουλιαγμένης.", "Ο Άγιος Νικόλαος Πλανάς υπήρξε ζωντανό παράδειγμα απλότητας, λειτουργικής ζωής, ελεημοσύνης και ταπείνωσης. Έδειξε ότι η αγιότητα δεν βρίσκεται στα μεγάλα λόγια, αλλά στην καθαρή καρδιά, στην αγάπη προς τον Θεό, στη Θεία Λειτουργία και στη θυσιαστική προσφορά προς τον άνθρωπο.", "Ἀπολυτίκιον\nἮχος α’. Τῆς ἐρήμου πολίτης.\nΤᾶς τοῦ πλάνου παγίδας ἐκφυγῶν, ἱερώτατε, ἀπλανῶς ἐπορεύθης διὰ βίου, πατὴρ ἠμῶν, Νικόλαε ἀοίδιμε Πλανᾶ, οὐράνια χαρίσματα λαβῶν, ἀγρυπνίαις καὶ νηστείαις, ἱερουργῶν ὁσίως τῷ Κυρίῳ σου. Ὅνπερ καθικετεύων ἐκτενῶς, Νάξιον ἱεράτευμα, πρέσβευε δωρηθῆναι καὶ ἠμὶν τὸ θεῖον ἔλεος."]}];

function stripPref(s){s=s.replace(/^Υπεύθυνος πυρογράφου\s*:?\s*/,'Πυρογράφος: ');s=s.replace(/^Υπεύθυνος τραπεζαρίας\s*/,'Τραπεζαρία ');s=s.replace(/^Υπεύθ\.\s*:?\s*/,'');s=s.replace(/^Υπεύθυνος\s*:?\s*/,'');s=s.replace(/υπ\.\s*/g,'');return s;}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function evHTML(ev){
  const meal=MEALS[ev.title.trim()];
  let h='<div class="ev'+(meal?' meal':'')+(SPIR.test(ev.title)?' spir':'')+'"><div class="t">'+esc(ev.time)+'</div><div class="b">';
  h+='<div class="ti">'+(meal?'<span class="ic">'+meal+'</span>':'')+esc(ev.title)+'</div>';
  for(let de of ev.details){
    if(isKeno(de))continue;
    if(isGrp(de)){h+='<div class="de">'+esc(de.replace(/^\[|\]$/g,''))+'</div>';continue;}
    const line=stripPref(full(de));
    if(SPORT.test(de)){
      const mm=line.match(/^([^:]+):\s*(.*)$/);
      h+='<div class="de">'+(mm?'<span class="chip">'+esc(mm[1])+'</span> '+esc(mm[2]):'<span class="chip">'+esc(line)+'</span>')+'</div>';
    } else {
      const parts=line.split(/\s*\/\s*/);
      for(const pp of parts) h+='<div class="de">'+esc(pp)+'</div>';
    }
  }
  return h+'</div></div>';
}

  out+='<a class="subbtn" href="'+wc+'">📅 Πρόσθεσε στο ημερολόγιό σου</a>';
  out+='<div class="tcard">';
  out+='<div class="titem"><b>iPhone / iPad / Mac:</b> πάτησε το κουμπί πιο πάνω → «Subscribe / Εγγραφή».</div>';
  out+='<div class="titem"><b>Outlook:</b> πάτησε το κουμπί → επιβεβαίωσε τη συνδρομή.</div>';
  out+='<div class="titem"><b>Google Calendar:</b> άνοιξε calendar.google.com → δίπλα στο «Άλλα ημερολόγια» πάτησε + (Προσθήκη) → «Από URL» → επικόλλησε:<div class="mono">'+url+'</div></div>';
  out+='</div>';
  out+='<div class="rsub" style="margin-top:10px">Δεν είναι στατικό αρχείο — το ημερολόγιό σου το ανανεώνει μόνο του κάθε λίγες ώρες, οπότε οι αλλαγές στο πρόγραμμα εμφανίζονται αυτόματα.</div>';
  document.getElementById('view').innerHTML=out; setActive('cal'); window.scrollTo({top:0});
}
function renderTips(){
  CUR='c';
  let out='<div class="rhead">Συμβουλές για Ομαδάρχες</div><div class="rsub">'+esc(TIPS.intro_title)+'</div>';
  out+='<div class="tcard">';
  for(const p of TIPS.intro) out+='<div class="titem">'+esc(p)+'</div>';
  out+='</div>';
  for(const sec of TIPS.sections){
    out+='<div class="tsec">'+esc(sec.h)+'</div><div class="tcard">';
    for(const it of sec.items) out+='<div class="titem chk">'+esc(it)+'</div>';
    out+='</div>';
  }
  document.getElementById('view').innerHTML=out; setActive('c'); window.scrollTo({top:0});
}
function norm(s){return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();}
function doSearch(v){
  const qx=document.getElementById('qx'); if(qx) qx.style.display=v?'block':'none';
  const q=norm(v.trim());
  if(q.length<2){ if(typeof CUR==='number')renderDay(CUR); else if(CUR==='r')renderRoster(); else if(CUR==='u')renderResp(); else if(CUR==='c')renderTips(); else if(CUR==='cal')renderCal(); else if(CUR==='v')renderLives(); else renderDay(defDay()); return; }
  const dn2=['14/7','15/7','16/7','17/7','18/7','19/7','20/7','21/7'];
  let body='',n=0;
  for(let di=0;di<DAYS.length;di++){
    for(const ev of DAYS[di].events){
      const hay=norm(ev.title+' '+ev.details.map(d=>full(d)).join(' '));
      if(hay.includes(q)){ n++; body+='<div class="sday">Μέρα '+(di+1)+' · '+dn2[di]+'</div>'+evHTML(ev); }
    }
  }
  document.getElementById('view').innerHTML='<div class="rhead">Αναζήτηση</div><div class="rsub">'+(n?n+(n===1?' αποτέλεσμα':' αποτελέσματα'):'Καμία εγγραφή')+'</div>'+body;
  window.scrollTo({top:0});
}
function renderLives(){
  CUR='v';
  let out='<div class="rhead">Βίοι Αγίων</div><div class="rsub">Οι άγιοι των 10 ομάδων — πάτησε για να διαβάσεις</div>';
  LIVES.forEach(function(L,i){
    out+='<div class="lcard"><div class="lhead" onclick="toggleLife('+i+')"><span class="lnum">'+L.n+'</span><span class="ltitle">'+esc(L.title)+'</span><span class="lchev" id="lc'+i+'">▾</span></div><div class="lbody" id="lb'+i+'">';
    for(const p of L.paras) out+='<p>'+esc(p)+'</p>';
    out+='</div></div>';
  });
  document.getElementById('view').innerHTML=out; setActive('v'); window.scrollTo({top:0});
}
function toggleLife(i){
  const b=document.getElementById('lb'+i), c=document.getElementById('lc'+i);
  const open=b.style.display==='block';
  b.style.display=open?'none':'block';
  if(c) c.textContent=open?'▾':'▴';
}
function defDay(){const n=nowInfo();if(n)return n.idx;return (new Date()<dateFor(0))?0:7;}
const dn=[14,15,16,17,18,19,20,21];
const wd=['Τρίτη','Τετάρτη','Πέμπτη','Παρασκευή','Σάββατο','Κυριακή','Δευτέρα','Τρίτη'];
let th='<button class="tab" data-k="r" onclick="renderRoster()">👥 Ομαδάρχες</button>';
for(let i=0;i<8;i++)th+='<button class="tab" data-k="'+i+'" onclick="renderDay('+i+')">'+wd[i]+'<span class="d">'+dn[i]+'/7</span></button>';
th+='<button class="tab" data-k="u" onclick="renderResp()">📋 Υπευθυνότητες</button>';
th+='<button class="tab" data-k="c" onclick="renderTips()">💡 Συμβουλές</button>';
th+='<button class="tab" data-k="cal" onclick="renderCal()">📅 Ημερολόγιο</button>';
th+='<button class="tab" data-k="v" onclick="renderLives()">📖 Βίοι Αγίων</button>';
document.getElementById('tabs').innerHTML=th;
renderDay(defDay());
setInterval(()=>{if(typeof CUR==='number'){const n=nowInfo();if(n&&n.idx===CUR)renderDay(CUR);}},30000);
</script></body></html>
