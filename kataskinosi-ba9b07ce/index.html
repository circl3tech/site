<style>
:root{--bg:#f4f6f8;--card:#fff;--ink:#12222b;--muted:#5b6b74;--line:#e5eaee;--accent:#0f5b7a;--accent2:#12833f;--chip:#e8eef1;--pill:#eaf3f7;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.4;padding-bottom:40px}
header{position:sticky;top:0;z-index:20;background:var(--accent);color:#fff;padding:14px 16px calc(10px);box-shadow:0 2px 10px rgba(0,0,0,.12)}
header h1{margin:0;font-size:17px;font-weight:700;letter-spacing:.2px}
header .sub{margin:2px 0 0;font-size:12.5px;opacity:.85}
.tabs{position:sticky;top:0;z-index:19;background:var(--accent);display:flex;gap:7px;overflow-x:auto;padding:0 12px 11px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:13px;font-weight:600;padding:7px 12px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.15s}
.tab .d{opacity:.8;font-weight:500;font-size:11px;margin-left:4px}
.tab.active{background:#fff;color:var(--accent)}
.wrap{max-width:640px;margin:0 auto;padding:14px 12px 0}
.dayhead{margin:6px 2px 12px}
.dayhead .mera{font-size:20px;font-weight:800;color:var(--accent)}
.dayhead .meta{font-size:13px;color:var(--muted);margin-top:2px}
.ev{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin:0 0 10px;box-shadow:0 1px 2px rgba(16,40,55,.04)}
.ev .t{flex:0 0 62px;font-size:14px;font-weight:800;color:var(--accent);padding-top:1px;font-variant-numeric:tabular-nums}
.ev .b{flex:1;min-width:0}
.ev .ti{font-size:15px;font-weight:700;margin:0 0 3px;color:var(--ink)}
.ev .de{font-size:13px;color:var(--muted);margin:2px 0 0}
.ev .de.grp{display:inline-block;background:var(--pill);color:var(--accent);border-radius:6px;padding:1px 7px;margin:3px 5px 0 0;font-weight:600;font-size:12px}
.ev.keno{background:#fff7f0;border-color:#ffd9bd}
.ev.keno .t,.ev.keno .ti{color:#c1560c}
.ev.now{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(18,131,63,.18)}
.ev.now .t{color:var(--accent2)}
.nowtag{display:inline-block;background:var(--accent2);color:#fff;font-size:10.5px;font-weight:700;border-radius:5px;padding:1px 6px;margin-left:6px;vertical-align:2px}
footer{max-width:640px;margin:18px auto 0;padding:0 14px;color:#9aa7ae;font-size:11.5px;text-align:center}
</style>
</head>

const MONTHS0=[6]; // July index
// camp dates 14..21 July 2026
const dateFor=i=>new Date(2026,6,14+i);
function parseHeader(h){
  // "ΜΕΡΑ 1  —  14/7 – Τρίτη · Πρώτη μέρα"
  const m=h.match(/ΜΕΡΑ\s+(\d+)\s*—\s*(.*)/);
  return m?{n:m[1],rest:m[2].trim()}:{n:'',rest:h};
}
function isGroupLine(s){return /^\[.*\]$/.test(s.trim());}
function isKeno(s){return /^ΚΕΝΟ/.test(s.trim());}
function evHasKeno(ev){return ev.details.some(isKeno);}
function renderDay(idx){
  const day=DAYS[idx]; const H=parseHeader(day.header);
  let out='<div class="dayhead"><div class="mera">Μέρα '+H.n+'</div><div class="meta">'+esc(H.rest)+'</div></div>';
  const now=nowInfo();
  for(const ev of day.events){
    const keno=evHasKeno(ev);
    let cls='ev'+(keno?' keno':'');
    if(now && now.dayIdx===idx && now.time===ev.time) cls+=' now';
    out+='<div class="'+cls+'">';
    out+='<div class="t">'+esc(ev.time)+'</div><div class="b">';
    out+='<div class="ti">'+esc(ev.title)+((cls.indexOf('now')>-1)?'<span class="nowtag">ΤΩΡΑ</span>':'')+'</div>';
    let groups='';
    for(const d of ev.details){
      if(isKeno(d)) continue;
      if(isGroupLine(d)){ groups+='<span class="de grp">'+esc(d.replace(/^\[|\]$/g,''))+'</span>'; }
      else { out+='<div class="de">'+esc(d)+'</div>'; }
    }
    if(groups) out+='<div style="margin-top:2px">'+groups+'</div>';
    out+='</div></div>';
  }
  document.getElementById('day').innerHTML=out;
  [...document.querySelectorAll('.tab')].forEach((t,i)=>t.classList.toggle('active',i===idx));
  window.scrollTo({top:0,behavior:'instant'});
}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function nowInfo(){
  const now=new Date();
  for(let i=0;i<8;i++){const d=dateFor(i); if(d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth()&&d.getDate()===now.getDate()){
    // find current/next event by time
    const cur=DAYS[i]; let best=null;
    const mins=now.getHours()*60+now.getMinutes();
    for(const ev of cur.events){const[h,m]=ev.time.split(':').map(Number);const t=h*60+m; if(t<=mins) best=ev.time;}
    return {dayIdx:i,time:best};
  }}
  return null;
}
function defaultDay(){const n=nowInfo(); if(n) return n.dayIdx; const now=new Date(); const start=dateFor(0); if(now<start) return 0; return 7;}
